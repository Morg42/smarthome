name: "Unittests Core"
on:
  workflow_dispatch:
  push:
    branches:
      - '*'
      - '!release_doc'
  pull_request:
    branches:
      - 'develop'

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
    name: Python ${{ matrix.python-version }}
    steps:
      - name: Setup OS (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install libudev-dev
          sudo apt-get install librrd-dev libpython3-dev
          sudo apt-get install gcc --only-upgrade

      # For push events github.ref_name is the branch name.
      # For PR events github.head_ref is the source branch name.
      # The previous GITHUB_REF strip produced 'refs/pull/N/merge' for PRs.
      - name: Get branch name
        id: extract_branch
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "branch=${{ github.head_ref }}" >>$GITHUB_OUTPUT
          else
            echo "branch=${{ github.ref_name }}" >>$GITHUB_OUTPUT
          fi

      - name: Workflow Information
        run: |
          echo "event:  ${{ github.event_name }}"
          echo "actor:  ${{ github.actor }}"
          echo "ref:    ${{ github.ref_name }}"
          echo "branch: ${{ steps.extract_branch.outputs.branch }}"
          echo "base:   ${{ github.base_ref }}"
          echo "head:   ${{ github.head_ref }}"

      # No repository/ref specified — actions/checkout defaults are correct for both events:
      #   push:         checks out github.sha (the pushed commit)
      #   pull_request: checks out refs/pull/N/merge (merged result of PR into target branch)
      #                 fails clearly if the PR has unresolved merge conflicts
      - name: Checkout core
        uses: actions/checkout@v4

      - name: Check if branch '${{ steps.extract_branch.outputs.branch }}' exists in smarthomeNG/plugins
        id: shng_branch_check
        run: echo "code=$(git ls-remote --exit-code --heads https://github.com/smarthomeNG/plugins ${{ steps.extract_branch.outputs.branch }} > /dev/null; echo $? )" >>$GITHUB_OUTPUT

      - name: Checkout plugins from branch '${{ steps.extract_branch.outputs.branch }}' (push on known smarthomeNG/plugins branch)
        if: github.event_name != 'pull_request' && steps.shng_branch_check.outputs.code == '0'
        uses: actions/checkout@v4
        with:
          repository: smarthomeNG/plugins
          ref: ${{ steps.extract_branch.outputs.branch }}
          path: plugins

      - name: Checkout plugins from branch 'develop' (pull request or push on unknown branch)
        if: github.event_name == 'pull_request' || steps.shng_branch_check.outputs.code == '2'
        uses: actions/checkout@v4
        with:
          repository: smarthomeNG/plugins
          ref: develop
          path: plugins

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          architecture: x64

      - run: python3 -m pip install --upgrade pip

      - name: Install setuptools
        run: pip install setuptools

      - name: Install requirements for unit testing
        run: pip install -r tests/requirements.txt

      - name: Build Requirements for SmartHomeNG
        run: python3 tools/build_requirements.py

      - name: Install SmartHomeNG base requirements
        # base requirements are needed for pytest to run
        run: pip install -r requirements/base.txt

      # ---  up to here, the workflow is identical for CORE and PLUGINS  ---

      # --- Linting ---
      - name: Lint with ruff
        run: |
          pip install "ruff>=0.4.0"
          ruff check . --output-format=github
        # --output-format=github annotates violations inline on the PR diff.
        # plugins/ is excluded via [tool.ruff] exclude in pyproject.toml.

      # --- Unit Tests ---
      - name: '>>> Run Python Unittests for CORE <<<'
        working-directory: ./tests
        run: pytest
