<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 560" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11">
  <defs>
    <marker id="arr" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L7,3.5 z" fill="#888"/>
    </marker>
    <marker id="arr-blue" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L7,3.5 z" fill="#2980b9"/>
    </marker>
    <marker id="arr-green" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L7,3.5 z" fill="#27ae60"/>
    </marker>
  </defs>

  <rect width="920" height="560" fill="#f8f9fa" rx="8"/>
  <text x="460" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#333">Module Dependency Map</text>

  <!-- ═══ item.py — centre ═══ -->
  <rect x="360" y="230" width="160" height="60" rx="6" fill="#2980b9" stroke="#1a6496" stroke-width="2"/>
  <text x="440" y="254" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">item.py</text>
  <text x="440" y="272" text-anchor="middle" font-size="10" fill="#cde" font-style="italic">imports + delegates</text>

  <!-- ═══ TOP ROW (3 modules) ═══ -->

  <!-- _typehandler  top-left -->
  <rect x="40"  y="55"  width="170" height="44" rx="5" fill="#fff" stroke="#27ae60" stroke-width="1.8"/>
  <text x="125" y="72"  text-anchor="middle" font-size="11" font-weight="bold" fill="#27ae60">_typehandler.py</text>
  <text x="125" y="88"  text-anchor="middle" font-size="10" fill="#555">157 lines</text>

  <!-- _history  top-centre -->
  <rect x="275" y="55"  width="170" height="44" rx="5" fill="#fff" stroke="#27ae60" stroke-width="1.8"/>
  <text x="360" y="72"  text-anchor="middle" font-size="11" font-weight="bold" fill="#27ae60">_history.py</text>
  <text x="360" y="88"  text-anchor="middle" font-size="10" fill="#555">187 lines</text>

  <!-- _logchange  top-right -->
  <rect x="510" y="55"  width="170" height="44" rx="5" fill="#fff" stroke="#27ae60" stroke-width="1.8"/>
  <text x="595" y="72"  text-anchor="middle" font-size="11" font-weight="bold" fill="#27ae60">_logchange.py</text>
  <text x="595" y="88"  text-anchor="middle" font-size="10" fill="#555">286 lines</text>

  <!-- ═══ RIGHT SIDE (2 modules) ═══ -->

  <!-- _eval  upper-right -->
  <rect x="740" y="130" width="160" height="44" rx="5" fill="#fff" stroke="#27ae60" stroke-width="1.8"/>
  <text x="820" y="147" text-anchor="middle" font-size="11" font-weight="bold" fill="#27ae60">_eval.py</text>
  <text x="820" y="163" text-anchor="middle" font-size="10" fill="#555">289 lines</text>

  <!-- _hysteresis  lower-right -->
  <rect x="740" y="310" width="160" height="44" rx="5" fill="#fff" stroke="#27ae60" stroke-width="1.8"/>
  <text x="820" y="327" text-anchor="middle" font-size="11" font-weight="bold" fill="#27ae60">_hysteresis.py</text>
  <text x="820" y="343" text-anchor="middle" font-size="10" fill="#555">286 lines</text>

  <!-- ═══ BOTTOM ROW (3 modules) ═══ -->

  <!-- _autotimer  bottom-left -->
  <rect x="40"  y="430" width="170" height="44" rx="5" fill="#fff" stroke="#27ae60" stroke-width="1.8"/>
  <text x="125" y="447" text-anchor="middle" font-size="11" font-weight="bold" fill="#27ae60">_autotimer.py</text>
  <text x="125" y="463" text-anchor="middle" font-size="10" fill="#555">282 lines</text>

  <!-- _pathresolution  bottom-centre -->
  <rect x="275" y="430" width="170" height="44" rx="5" fill="#fff" stroke="#27ae60" stroke-width="1.8"/>
  <text x="360" y="447" text-anchor="middle" font-size="11" font-weight="bold" fill="#27ae60">_pathresolution.py</text>
  <text x="360" y="463" text-anchor="middle" font-size="10" fill="#555">277 lines</text>

  <!-- _parsing  bottom-right (round 2, dashed border) -->
  <rect x="510" y="430" width="170" height="44" rx="5" fill="#fff" stroke="#1e8449" stroke-width="1.8" stroke-dasharray="5,2"/>
  <text x="595" y="447" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e8449">_parsing.py</text>
  <text x="595" y="463" text-anchor="middle" font-size="10" fill="#555">326 lines</text>

  <!-- ═══ LEFT SIDE (2 round-2 modules) ═══ -->

  <!-- _casting  upper-left -->
  <rect x="10"  y="190" width="170" height="44" rx="5" fill="#fff" stroke="#1e8449" stroke-width="1.8" stroke-dasharray="5,2"/>
  <text x="95"  y="207" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e8449">_casting.py</text>
  <text x="95"  y="223" text-anchor="middle" font-size="10" fill="#555">184 lines</text>

  <!-- _triggers  lower-left -->
  <rect x="10"  y="310" width="170" height="44" rx="5" fill="#fff" stroke="#1e8449" stroke-width="1.8" stroke-dasharray="5,2"/>
  <text x="95"  y="327" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e8449">_triggers.py</text>
  <text x="95"  y="343" text-anchor="middle" font-size="10" fill="#555">156 lines</text>

  <!-- ═══ item.py → sub-modules (blue dashed = imports) ═══ -->
  <!-- item.py → _typehandler -->
  <line x1="390" y1="232" x2="178" y2="99" stroke="#2980b9" stroke-width="1.5" marker-end="url(#arr-blue)" stroke-dasharray="5,3"/>
  <!-- item.py → _history -->
  <line x1="415" y1="230" x2="400" y2="100" stroke="#2980b9" stroke-width="1.5" marker-end="url(#arr-blue)" stroke-dasharray="5,3"/>
  <!-- item.py → _logchange -->
  <line x1="485" y1="233" x2="598" y2="100" stroke="#2980b9" stroke-width="1.5" marker-end="url(#arr-blue)" stroke-dasharray="5,3"/>
  <!-- item.py → _eval -->
  <line x1="520" y1="248" x2="738" y2="165" stroke="#2980b9" stroke-width="1.5" marker-end="url(#arr-blue)" stroke-dasharray="5,3"/>
  <!-- item.py → _hysteresis -->
  <line x1="518" y1="272" x2="738" y2="330" stroke="#2980b9" stroke-width="1.5" marker-end="url(#arr-blue)" stroke-dasharray="5,3"/>
  <!-- item.py → _pathresolution -->
  <line x1="418" y1="290" x2="394" y2="428" stroke="#2980b9" stroke-width="1.5" marker-end="url(#arr-blue)" stroke-dasharray="5,3"/>
  <!-- item.py → _autotimer -->
  <line x1="385" y1="288" x2="185" y2="435" stroke="#2980b9" stroke-width="1.5" marker-end="url(#arr-blue)" stroke-dasharray="5,3"/>
  <!-- item.py → _parsing -->
  <line x1="468" y1="289" x2="568" y2="428" stroke="#2980b9" stroke-width="1.5" marker-end="url(#arr-blue)" stroke-dasharray="5,3"/>
  <!-- item.py → _casting -->
  <line x1="362" y1="248" x2="182" y2="220" stroke="#2980b9" stroke-width="1.5" marker-end="url(#arr-blue)" stroke-dasharray="5,3"/>
  <!-- item.py → _triggers -->
  <line x1="362" y1="268" x2="182" y2="330" stroke="#2980b9" stroke-width="1.5" marker-end="url(#arr-blue)" stroke-dasharray="5,3"/>

  <!-- ═══ cross-module calls (green = calls via item proxy) ═══ -->
  <!-- _eval calls _history via item._history -->
  <line x1="740" y1="148" x2="448" y2="99"  stroke="#27ae60" stroke-width="1.2" marker-end="url(#arr-green)" stroke-dasharray="3,3"/>
  <!-- _hysteresis calls _history via item._history -->
  <line x1="762" y1="312" x2="448" y2="99"  stroke="#27ae60" stroke-width="1.2" marker-end="url(#arr-green)" stroke-dasharray="3,3"/>
  <!-- _logchange calls _pathresolution via item -->
  <line x1="565" y1="100" x2="432" y2="428" stroke="#27ae60" stroke-width="1.2" marker-end="url(#arr-green)" stroke-dasharray="3,3"/>
  <!-- _parsing calls _pathresolution via item -->
  <line x1="566" y1="432" x2="448" y2="474" stroke="#27ae60" stroke-width="1.2" marker-end="url(#arr-green)" stroke-dasharray="3,3"/>

  <!-- ═══ Proxy methods/properties box ═══ -->
  <rect x="148" y="230" width="196" height="78" rx="5" fill="#fef9e7" stroke="#f39c12" stroke-width="1.5"/>
  <text x="246" y="248" text-anchor="middle" font-size="10" font-weight="bold" fill="#d68910">Proxies on Item</text>
  <text x="246" y="263" text-anchor="middle" font-size="9.5" fill="#7d6608">_update_item()  →  __update</text>
  <text x="246" y="277" text-anchor="middle" font-size="9.5" fill="#7d6608">_run_attribute_eval()  →  __run_attribute_eval</text>
  <text x="246" y="291" text-anchor="middle" font-size="9.5" fill="#7d6608">_logics_to_trigger  →  __logics_to_trigger</text>
  <text x="246" y="305" text-anchor="middle" font-size="9.5" fill="#7d6608">_methods_to_trigger  →  __methods_to_trigger</text>
  <line x1="344" y1="268" x2="360" y2="258" stroke="#f39c12" stroke-width="1.2" stroke-dasharray="4,2"/>

  <!-- ═══ Legend ═══ -->
  <rect x="20" y="508" width="880" height="38" rx="5" fill="#fff" stroke="#ddd"/>
  <line x1="36"  y1="527" x2="76"  y2="527" stroke="#2980b9" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-blue)"/>
  <text x="82"  y="531" font-size="10" fill="#333">item.py imports sub-module</text>
  <line x1="230" y1="527" x2="270" y2="527" stroke="#27ae60" stroke-width="1.2" stroke-dasharray="3,3" marker-end="url(#arr-green)"/>
  <text x="276" y="531" font-size="10" fill="#333">sub-module calls another via item proxy</text>
  <rect x="488" y="520" width="12" height="12" fill="#fef9e7" stroke="#f39c12" rx="2"/>
  <text x="504" y="531" font-size="10" fill="#333">proxy (wraps __dunder without mangling)</text>
  <rect x="730" y="520" width="10" height="10" fill="#fff" stroke="#27ae60" rx="1"/>
  <text x="744" y="531" font-size="10" fill="#555">Round 1</text>
  <rect x="800" y="520" width="10" height="10" fill="#fff" stroke="#1e8449" stroke-dasharray="5,2" rx="1"/>
  <text x="814" y="531" font-size="10" fill="#555">Round 2</text>
</svg>
