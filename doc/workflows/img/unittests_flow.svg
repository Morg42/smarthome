<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 820" width="660" height="820" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#16a34a"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1d4ed8"/>
    </marker>
  </defs>

  <rect width="660" height="820" fill="#f8fafc" rx="8"/>

  <!-- ── TRIGGER EVENT (top) ─────────────────────────────────────── -->
  <!-- push box -->
  <rect x="40"  y="20" width="160" height="52" fill="#1d4ed8" rx="6"/>
  <text x="120" y="43" fill="white" text-anchor="middle" font-weight="bold">push event</text>
  <text x="120" y="60" fill="#bfdbfe" text-anchor="middle" font-size="11">any branch (not release_doc)</text>

  <!-- PR box -->
  <rect x="460" y="20" width="160" height="52" fill="#7c3aed" rx="6"/>
  <text x="540" y="43" fill="white" text-anchor="middle" font-weight="bold">pull_request event</text>
  <text x="540" y="60" fill="#ddd6fe" text-anchor="middle" font-size="11">PR targeting develop</text>

  <!-- OS SETUP -->
  <rect x="210" y="100" width="240" height="40" fill="#475569" rx="6"/>
  <text x="330" y="125" fill="white" text-anchor="middle">Setup OS + install system libs</text>

  <!-- arrows from triggers to OS -->
  <line x1="120" y1="72" x2="120" y2="90"  stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="120" y1="90" x2="280" y2="90"  stroke="#475569" stroke-width="1.5"/>
  <line x1="280" y1="90" x2="280" y2="100" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <line x1="540" y1="72" x2="540" y2="90"  stroke="#475569" stroke-width="1.5"/>
  <line x1="540" y1="90" x2="380" y2="90"  stroke="#475569" stroke-width="1.5"/>
  <line x1="380" y1="90" x2="380" y2="100" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- BRANCH EXTRACTION decision diamond -->
  <polygon points="330,168 430,188 330,208 230,188" fill="#d97706" stroke="#b45309" stroke-width="1.5"/>
  <text x="330" y="184" fill="white" text-anchor="middle" font-weight="bold" font-size="12">event type?</text>
  <text x="330" y="200" fill="#fef3c7" text-anchor="middle" font-size="11">push or pull_request</text>

  <!-- arrow OS → decision -->
  <line x1="330" y1="140" x2="330" y2="168" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- push branch: github.ref_name -->
  <rect x="40"  y="228" width="180" height="40" fill="#0f766e" rx="6"/>
  <text x="130" y="249" fill="white" text-anchor="middle" font-size="12">branch = github.ref_name</text>
  <text x="130" y="263" fill="#99f6e4" text-anchor="middle" font-size="11">(e.g. "develop", "my-feature")</text>

  <!-- PR branch: github.head_ref -->
  <rect x="440" y="228" width="180" height="40" fill="#7c3aed" rx="6"/>
  <text x="530" y="249" fill="white" text-anchor="middle" font-size="12">branch = github.head_ref</text>
  <text x="530" y="263" fill="#ddd6fe" text-anchor="middle" font-size="11">(source branch of the PR)</text>

  <!-- arrows from diamond to branch boxes -->
  <line x1="230" y1="188" x2="130" y2="188" stroke="#0f766e" stroke-width="1.5"/>
  <line x1="130" y1="188" x2="130" y2="228" stroke="#0f766e" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="180" y="182" fill="#0f766e" text-anchor="middle" font-size="11" font-weight="bold">push</text>

  <line x1="430" y1="188" x2="530" y2="188" stroke="#7c3aed" stroke-width="1.5"/>
  <line x1="530" y1="188" x2="530" y2="228" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="480" y="182" fill="#7c3aed" text-anchor="middle" font-size="11" font-weight="bold">PR</text>

  <!-- CORE CHECKOUT decision diamond -->
  <polygon points="330,310 430,330 330,350 230,330" fill="#d97706" stroke="#b45309" stroke-width="1.5"/>
  <text x="330" y="326" fill="white" text-anchor="middle" font-weight="bold" font-size="12">event type?</text>
  <text x="330" y="342" fill="#fef3c7" text-anchor="middle" font-size="11">determines checkout strategy</text>

  <!-- arrows from branch boxes to checkout diamond -->
  <line x1="130" y1="268" x2="130" y2="298" stroke="#475569" stroke-width="1.5"/>
  <line x1="130" y1="298" x2="280" y2="298" stroke="#475569" stroke-width="1.5"/>
  <line x1="280" y1="298" x2="280" y2="310" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <line x1="530" y1="268" x2="530" y2="298" stroke="#475569" stroke-width="1.5"/>
  <line x1="530" y1="298" x2="380" y2="298" stroke="#475569" stroke-width="1.5"/>
  <line x1="380" y1="298" x2="380" y2="310" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- checkout push result -->
  <rect x="30" y="368" width="200" height="52" fill="#0f766e" rx="6"/>
  <text x="130" y="389" fill="white" text-anchor="middle" font-size="12" font-weight="bold">Checkout: pushed SHA</text>
  <text x="130" y="404" fill="#99f6e4" text-anchor="middle" font-size="11">actions/checkout@v4</text>
  <text x="130" y="417" fill="#99f6e4" text-anchor="middle" font-size="11">default = github.sha</text>

  <!-- checkout PR result -->
  <rect x="430" y="368" width="200" height="52" fill="#7c3aed" rx="6"/>
  <text x="530" y="386" fill="white" text-anchor="middle" font-size="12" font-weight="bold">Checkout: merge commit</text>
  <text x="530" y="401" fill="#ddd6fe" text-anchor="middle" font-size="11">refs/pull/N/merge</text>
  <text x="530" y="415" fill="#ddd6fe" text-anchor="middle" font-size="11">(PR branch merged into develop)</text>

  <!-- arrows from diamond to checkout results -->
  <line x1="230" y1="330" x2="130" y2="330" stroke="#0f766e" stroke-width="1.5"/>
  <line x1="130" y1="330" x2="130" y2="368" stroke="#0f766e" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="182" y="324" fill="#0f766e" text-anchor="middle" font-size="11" font-weight="bold">push</text>

  <line x1="430" y1="330" x2="530" y2="330" stroke="#7c3aed" stroke-width="1.5"/>
  <line x1="530" y1="330" x2="530" y2="368" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="480" y="324" fill="#7c3aed" text-anchor="middle" font-size="11" font-weight="bold">PR</text>

  <!-- PLUGINS CHECK box -->
  <rect x="190" y="448" width="280" height="40" fill="#475569" rx="6"/>
  <text x="330" y="469" fill="white" text-anchor="middle">Check: does plugins repo have</text>
  <text x="330" y="483" fill="#94a3b8" text-anchor="middle" font-size="11">git ls-remote smarthomeNG/plugins &lt;branch&gt;</text>

  <!-- arrows converging to plugins check -->
  <line x1="130" y1="420" x2="130" y2="438" stroke="#475569" stroke-width="1.5"/>
  <line x1="130" y1="438" x2="265" y2="438" stroke="#475569" stroke-width="1.5"/>
  <line x1="265" y1="438" x2="265" y2="448" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <line x1="530" y1="420" x2="530" y2="438" stroke="#475569" stroke-width="1.5"/>
  <line x1="530" y1="438" x2="395" y2="438" stroke="#475569" stroke-width="1.5"/>
  <line x1="395" y1="438" x2="395" y2="448" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- PLUGINS decision diamond -->
  <polygon points="330,516 440,536 330,556 220,536" fill="#d97706" stroke="#b45309" stroke-width="1.5"/>
  <text x="330" y="530" fill="white" text-anchor="middle" font-weight="bold" font-size="12">branch exists</text>
  <text x="330" y="548" fill="#fef3c7" text-anchor="middle" font-size="11">AND event is push?</text>

  <!-- arrow check → diamond -->
  <line x1="330" y1="488" x2="330" y2="516" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- plugins checkout: matching branch -->
  <rect x="30"  y="574" width="185" height="40" fill="#16a34a" rx="6"/>
  <text x="122" y="591" fill="white" text-anchor="middle" font-size="12">Checkout plugins</text>
  <text x="122" y="606" fill="#bbf7d0" text-anchor="middle" font-size="11">at matching branch</text>

  <!-- plugins checkout: develop -->
  <rect x="445" y="574" width="185" height="40" fill="#475569" rx="6"/>
  <text x="537" y="591" fill="white" text-anchor="middle" font-size="12">Checkout plugins</text>
  <text x="537" y="606" fill="#94a3b8" text-anchor="middle" font-size="11">at develop (default)</text>

  <!-- arrows from plugins diamond -->
  <line x1="220" y1="536" x2="122" y2="536" stroke="#16a34a" stroke-width="1.5"/>
  <line x1="122" y1="536" x2="122" y2="574" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="174" y="529" fill="#16a34a" text-anchor="middle" font-size="11" font-weight="bold">yes</text>

  <line x1="440" y1="536" x2="537" y2="536" stroke="#475569" stroke-width="1.5"/>
  <line x1="537" y1="536" x2="537" y2="574" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="488" y="529" fill="#64748b" text-anchor="middle" font-size="11" font-weight="bold">no / PR</text>

  <!-- SETUP + INSTALL -->
  <rect x="190" y="642" width="280" height="36" fill="#475569" rx="6"/>
  <text x="330" y="665" fill="white" text-anchor="middle">Setup Python + install dependencies</text>

  <!-- arrows converging -->
  <line x1="122" y1="614" x2="122" y2="630" stroke="#475569" stroke-width="1.5"/>
  <line x1="122" y1="630" x2="265" y2="630" stroke="#475569" stroke-width="1.5"/>
  <line x1="265" y1="630" x2="265" y2="642" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <line x1="537" y1="614" x2="537" y2="630" stroke="#475569" stroke-width="1.5"/>
  <line x1="537" y1="630" x2="395" y2="630" stroke="#475569" stroke-width="1.5"/>
  <line x1="395" y1="630" x2="395" y2="642" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- RUFF -->
  <rect x="190" y="702" width="280" height="36" fill="#854d0e" rx="6"/>
  <text x="330" y="719" fill="white" text-anchor="middle">Lint with ruff (non-blocking)</text>
  <text x="330" y="733" fill="#fef9c3" text-anchor="middle" font-size="11">annotations on PR diff — never fails the build</text>

  <line x1="330" y1="678" x2="330" y2="702" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- PYTEST -->
  <rect x="210" y="762" width="240" height="36" fill="#be123c" rx="6"/>
  <text x="330" y="779" fill="white" text-anchor="middle" font-weight="bold">Run pytest</text>
  <text x="330" y="793" fill="#fecdd3" text-anchor="middle" font-size="11">fails build if any test fails</text>

  <line x1="330" y1="738" x2="330" y2="762" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- matrix note -->
  <rect x="50" y="808" width="560" height="12" fill="none"/>
  <text x="330" y="817" fill="#64748b" text-anchor="middle" font-size="11">All steps above run 5 times in parallel: Python 3.10, 3.11, 3.12, 3.13, 3.14</text>

</svg>
