<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 530" font-family="'Segoe UI',Arial,sans-serif">
  <defs>
    <marker id="a1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#3B82F6"/>
    </marker>
    <marker id="a2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#7C3AED"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="530" fill="#F8FAFC"/>

  <!-- Title -->
  <text x="480" y="28" text-anchor="middle" font-size="17" font-weight="bold" fill="#0F172A">shngAdmin — System Architecture</text>

  <!-- ═══════════════ BROWSER SECTION ═══════════════ -->
  <rect x="12" y="42" width="435" height="476" rx="10" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2"/>
  <text x="32" y="62" font-size="13" font-weight="bold" fill="#1E40AF">🌐  Browser</text>

  <!-- Angular app dashed border -->
  <rect x="22" y="70" width="415" height="438" rx="8" fill="#DBEAFE" stroke="#60A5FA" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="230" y="90" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E3A8A">Angular SPA — shngAdmin v1.12.0</text>

  <!-- Components -->
  <rect x="34" y="100" width="185" height="132" rx="6" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1"/>
  <text x="127" y="118" text-anchor="middle" font-size="11" font-weight="bold" fill="#14532D">Components</text>
  <text x="127" y="135" text-anchor="middle" font-size="9.5" fill="#166534">AppComponent  (root shell)</text>
  <text x="127" y="150" text-anchor="middle" font-size="9.5" fill="#166534">TopNavigationComponent</text>
  <text x="127" y="165" text-anchor="middle" font-size="9.5" fill="#166534">OfflineBannerComponent</text>
  <text x="127" y="180" text-anchor="middle" font-size="9.5" fill="#166534">RouterOutlet  (lazy modules)</text>
  <text x="127" y="195" text-anchor="middle" font-size="9.5" fill="#166534">8 feature modules</text>
  <text x="127" y="210" text-anchor="middle" font-size="9.5" fill="#166534">PrimeNG Toast</text>
  <text x="127" y="225" text-anchor="middle" font-size="9.5" fill="#166534">LoginComponent / NotFoundComponent</text>

  <!-- Services -->
  <rect x="229" y="100" width="195" height="132" rx="6" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1"/>
  <text x="327" y="118" text-anchor="middle" font-size="11" font-weight="bold" fill="#78350F">Services</text>
  <text x="327" y="135" text-anchor="middle" font-size="9.5" fill="#92400E">AppConfigService  (centralised config)</text>
  <text x="327" y="150" text-anchor="middle" font-size="9.5" fill="#92400E">AuthService  (JWT, renewal)</text>
  <text x="327" y="165" text-anchor="middle" font-size="9.5" fill="#92400E">ConnectivityService  (heartbeat)</text>
  <text x="327" y="180" text-anchor="middle" font-size="9.5" fill="#92400E">ServerApiService  (bootstrap calls)</text>
  <text x="327" y="195" text-anchor="middle" font-size="9.5" fill="#92400E">12 × domain API services</text>
  <text x="327" y="210" text-anchor="middle" font-size="9.5" fill="#92400E">SharedService  LogService</text>
  <text x="327" y="225" text-anchor="middle" font-size="9.5" fill="#92400E">UserPreferencesService</text>

  <!-- Guards / Interceptors -->
  <rect x="34" y="244" width="185" height="100" rx="6" fill="#FCE7F3" stroke="#F9A8D4" stroke-width="1"/>
  <text x="127" y="262" text-anchor="middle" font-size="11" font-weight="bold" fill="#831843">Guards &amp; Interceptors</text>
  <text x="127" y="279" text-anchor="middle" font-size="9.5" fill="#9D174D">appReadyGuard  (5 s timeout)</text>
  <text x="127" y="294" text-anchor="middle" font-size="9.5" fill="#9D174D">authGuard  (3 s timeout)</text>
  <text x="127" y="309" text-anchor="middle" font-size="9.5" fill="#9D174D">connectivityInterceptor</text>
  <text x="127" y="324" text-anchor="middle" font-size="9.5" fill="#9D174D">JWT Interceptor  (auth0)</text>
  <text x="127" y="339" text-anchor="middle" font-size="9.5" fill="#9D174D">→ adds Authorization: Bearer</text>

  <!-- Storage -->
  <rect x="229" y="244" width="195" height="114" rx="6" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  <text x="327" y="262" text-anchor="middle" font-size="11" font-weight="bold" fill="#334155">Browser Storage</text>
  <text x="327" y="284" text-anchor="middle" font-size="9.5" fill="#475569">sessionStorage</text>
  <text x="327" y="299" text-anchor="middle" font-size="9.5" fill="#64748B">JWT token  (cleared on tab close)</text>
  <text x="327" y="319" text-anchor="middle" font-size="9.5" fill="#475569">localStorage</text>
  <text x="327" y="334" text-anchor="middle" font-size="9.5" fill="#64748B">User language preference</text>
  <text x="327" y="349" text-anchor="middle" font-size="9.5" fill="#64748B">shng.index_fingerprint  (ETag for stale check)</text>

  <!-- WebSocket client -->
  <rect x="34" y="356" width="390" height="140" rx="6" fill="#EDE9FE" stroke="#C4B5FD" stroke-width="1"/>
  <text x="229" y="374" text-anchor="middle" font-size="11" font-weight="bold" fill="#4C1D95">WebSocket Layer</text>
  <text x="229" y="391" text-anchor="middle" font-size="9.5" fill="#5B21B6">WebsocketService — raw WS connection, auto-reconnect with backoff [2 s→4→8→16→30], message queue</text>
  <text x="229" y="408" text-anchor="middle" font-size="9.5" fill="#5B21B6">WebsocketPluginService — domain protocol, subscriptions, real-time metric series</text>
  <text x="229" y="425" text-anchor="middle" font-size="9.5" fill="#5B21B6">Subjects: systemload · systemmemory · systemswap · memory · threads · workerThreads · disk</text>
  <text x="229" y="442" text-anchor="middle" font-size="9.5" fill="#5B21B6">Sends: identity (browser info) · monitor subscribe · series requests</text>
  <text x="229" y="459" text-anchor="middle" font-size="9.5" fill="#5B21B6">Receives: item value updates · series data for charts</text>
  <text x="229" y="476" text-anchor="middle" font-size="9.5" fill="#5B21B6">Converts timestamps, normalises memory values (÷ 1 000 000)</text>

  <!-- ═══════════════ NETWORK ARROWS ═══════════════ -->
  <!-- HTTP label -->
  <text x="486" y="200" text-anchor="middle" font-size="10" font-weight="bold" fill="#1D4ED8">HTTPS REST</text>
  <line x1="447" y1="213" x2="513" y2="213" stroke="#3B82F6" stroke-width="2" marker-end="url(#a1)"/>
  <line x1="513" y1="230" x2="447" y2="230" stroke="#3B82F6" stroke-width="2" marker-end="url(#a1)"/>
  <text x="480" y="248" text-anchor="middle" font-size="9" fill="#3B82F6">+ Bearer JWT</text>

  <!-- WS label -->
  <text x="480" y="396" text-anchor="middle" font-size="10" font-weight="bold" fill="#6D28D9">WebSocket</text>
  <line x1="424" y1="410" x2="513" y2="410" stroke="#7C3AED" stroke-width="2" marker-end="url(#a2)"/>
  <line x1="513" y1="428" x2="424" y2="428" stroke="#7C3AED" stroke-width="2" marker-end="url(#a2)"/>
  <text x="480" y="447" text-anchor="middle" font-size="9" fill="#6D28D9">ws://host:port/adm</text>

  <!-- ═══════════════ BACKEND SECTION ═══════════════ -->
  <rect x="525" y="42" width="423" height="476" rx="10" fill="#F0FDF4" stroke="#86EFAC" stroke-width="2"/>
  <text x="545" y="62" font-size="13" font-weight="bold" fill="#166534">⚙️  SmartHomeNG Server</text>

  <!-- REST API -->
  <rect x="537" y="70" width="399" height="240" rx="8" fill="#DCFCE7" stroke="#4ADE80" stroke-width="1.5"/>
  <text x="737" y="90" text-anchor="middle" font-size="12" font-weight="bold" fill="#14532D">REST API  /api/</text>

  <rect x="549" y="102" width="180" height="192" rx="5" fill="#BBF7D0" stroke="#34D399" stroke-width="1"/>
  <text x="639" y="120" text-anchor="middle" font-size="10" font-weight="bold" fill="#065F46">Endpoints</text>
  <text x="639" y="137" text-anchor="middle" font-size="9" fill="#065F46">/server/          bootstrap info</text>
  <text x="639" y="152" text-anchor="middle" font-size="9" fill="#065F46">/server/info      full config</text>
  <text x="639" y="167" text-anchor="middle" font-size="9" fill="#065F46">/authenticate/user  login</text>
  <text x="639" y="182" text-anchor="middle" font-size="9" fill="#065F46">/authenticate/renew token</text>
  <text x="639" y="197" text-anchor="middle" font-size="9" fill="#065F46">/items/    /items/tree</text>
  <text x="639" y="212" text-anchor="middle" font-size="9" fill="#065F46">/logics/   /plugins/</text>
  <text x="639" y="227" text-anchor="middle" font-size="9" fill="#065F46">/scenes/   /schedulers/</text>
  <text x="639" y="242" text-anchor="middle" font-size="9" fill="#065F46">/threads/  /logs/ /loggers/</text>
  <text x="639" y="257" text-anchor="middle" font-size="9" fill="#065F46">/files/    /config/</text>
  <text x="639" y="272" text-anchor="middle" font-size="9" fill="#065F46">/services/ /functions/</text>
  <text x="639" y="287" text-anchor="middle" font-size="9" fill="#065F46">/system/info  /server/pypi</text>

  <rect x="741" y="102" width="183" height="192" rx="5" fill="#BBF7D0" stroke="#34D399" stroke-width="1"/>
  <text x="833" y="120" text-anchor="middle" font-size="10" font-weight="bold" fill="#065F46">Auth Model</text>
  <text x="833" y="140" text-anchor="middle" font-size="9" fill="#065F46">JWT tokens</text>
  <text x="833" y="157" text-anchor="middle" font-size="9" fill="#065F46">SHA-512 password hash</text>
  <text x="833" y="174" text-anchor="middle" font-size="9" fill="#065F46">Token renewal at 50% TTL</text>
  <text x="833" y="191" text-anchor="middle" font-size="9" fill="#065F46">Anonymous login support</text>
  <text x="833" y="208" text-anchor="middle" font-size="9" fill="#065F46">login_required flag</text>
  <text x="833" y="230" text-anchor="middle" font-size="9" fill="#065F46">All /api/ calls require</text>
  <text x="833" y="245" text-anchor="middle" font-size="9" fill="#065F46">Authorization: Bearer header</text>
  <text x="833" y="265" text-anchor="middle" font-size="9" fill="#065F46">Server sends full config:</text>
  <text x="833" y="280" text-anchor="middle" font-size="9" fill="#065F46">timezone, branches, wsPort</text>
  <text x="833" y="295" text-anchor="middle" font-size="9" fill="#065F46">itemtree settings, dev mode</text>

  <!-- WebSocket Server -->
  <rect x="537" y="322" width="399" height="118" rx="8" fill="#EDE9FE" stroke="#A78BFA" stroke-width="1.5"/>
  <text x="737" y="342" text-anchor="middle" font-size="12" font-weight="bold" fill="#4C1D95">WebSocket Server  /adm</text>
  <text x="737" y="362" text-anchor="middle" font-size="9.5" fill="#5B21B6">Real-time item value subscriptions (cmd: monitor / item)</text>
  <text x="737" y="378" text-anchor="middle" font-size="9.5" fill="#5B21B6">System metric streaming — CPU, RAM, swap, disk, threads (cmd: series)</text>
  <text x="737" y="394" text-anchor="middle" font-size="9.5" fill="#5B21B6">Historical series data for charts (period e.g. 24h, up to N data points)</text>
  <text x="737" y="410" text-anchor="middle" font-size="9.5" fill="#5B21B6">Accepts identity messages for browser-side logging</text>
  <text x="737" y="426" text-anchor="middle" font-size="9.5" fill="#5B21B6">Message protocol: JSON {cmd, id, val, items, series, start, end, count}</text>

  <!-- SHNG Core -->
  <rect x="537" y="452" width="399" height="54" rx="8" fill="#FEF9C3" stroke="#FDE047" stroke-width="1.5"/>
  <text x="737" y="473" text-anchor="middle" font-size="12" font-weight="bold" fill="#713F12">SHNG Core</text>
  <text x="737" y="492" text-anchor="middle" font-size="9.5" fill="#78350F">Items · Logic Engine · Plugins · Schedulers · File System · PyPI packages</text>
</svg>
