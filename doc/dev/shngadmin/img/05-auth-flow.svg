<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 640" font-family="'Segoe UI',Arial,sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#374151"/>
    </marker>
    <marker id="ag" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#16A34A"/>
    </marker>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#DC2626"/>
    </marker>
  </defs>
  <rect width="860" height="640" fill="#F9FAFB"/>
  <text x="430" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#111827">shngAdmin — Authentication Flow</text>
  <text x="430" y="44" text-anchor="middle" font-size="10" fill="#6B7280">JWT-based auth with sha-512 password hashing and automatic token renewal</text>

  <!-- Actors -->
  <text x="100" y="74" text-anchor="middle" font-size="11" font-weight="bold" fill="#1E40AF">Browser / User</text>
  <line x1="100" y1="78" x2="100" y2="620" stroke="#93C5FD" stroke-width="1.5" stroke-dasharray="6,4"/>

  <text x="340" y="74" text-anchor="middle" font-size="11" font-weight="bold" fill="#831843">AuthService</text>
  <line x1="340" y1="78" x2="340" y2="620" stroke="#F9A8D4" stroke-width="1.5" stroke-dasharray="6,4"/>

  <text x="580" y="74" text-anchor="middle" font-size="11" font-weight="bold" fill="#78350F">SHNG REST /api/</text>
  <line x1="580" y1="78" x2="580" y2="620" stroke="#FCD34D" stroke-width="1.5" stroke-dasharray="6,4"/>

  <text x="760" y="74" text-anchor="middle" font-size="11" font-weight="bold" fill="#334155">sessionStorage</text>
  <line x1="760" y1="78" x2="760" y2="620" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- ── SCENARIO A: existing valid token ── -->
  <rect x="10" y="88" width="840" height="16" rx="3" fill="#DBEAFE"/>
  <text x="430" y="100" text-anchor="middle" font-size="10" font-weight="bold" fill="#1E40AF">Scenario A — Page reload with valid token already in sessionStorage</text>

  <text x="110" y="126" font-size="9" fill="#374151">App starts (constructor)</text>
  <line x1="100" y1="120" x2="338" y2="120" stroke="#374151" stroke-width="1.5" marker-end="url(#a)"/>

  <text x="345" y="144" font-size="9" fill="#374151">sessionStorage.getItem('token')</text>
  <line x1="340" y1="138" x2="758" y2="138" stroke="#374151" stroke-width="1.5" marker-end="url(#a)"/>

  <text x="345" y="162" font-size="9" fill="#16A34A">token present and not expired</text>
  <line x1="758" y1="156" x2="342" y2="156" stroke="#16A34A" stroke-width="1.5" marker-end="url(#ag)"/>

  <text x="345" y="180" font-size="9" fill="#374151">loggedIn$.next(true)</text>
  <line x1="338" y1="174" x2="102" y2="174" stroke="#374151" stroke-width="1.5" marker-end="url(#a)"/>

  <text x="80" y="194" font-size="9" fill="#16A34A">→ authGuard passes immediately (isLoggedIn() = true)</text>

  <!-- ── SCENARIO B: manual login ── -->
  <rect x="10" y="210" width="840" height="16" rx="3" fill="#FCE7F3"/>
  <text x="430" y="222" text-anchor="middle" font-size="10" font-weight="bold" fill="#831843">Scenario B — User submits login form</text>

  <text x="110" y="248" font-size="9" fill="#374151">username + password entered</text>
  <line x1="100" y1="242" x2="338" y2="242" stroke="#374151" stroke-width="1.5" marker-end="url(#a)"/>

  <text x="345" y="262" font-size="9" fill="#374151">sha512(user + salt) + sha512(sha512(pwd) + salt)</text>
  <line x1="340" y1="258" x2="340" y2="270" stroke="#374151" stroke-width="1"/>

  <text x="345" y="290" font-size="9" fill="#374151">POST /api/authenticate/user  {username_hash, password_hash}</text>
  <line x1="340" y1="284" x2="578" y2="284" stroke="#374151" stroke-width="1.5" marker-end="url(#a)"/>

  <text x="345" y="310" font-size="9" fill="#16A34A">200 OK  {token: "eyJ..."}</text>
  <line x1="578" y1="304" x2="342" y2="304" stroke="#16A34A" stroke-width="1.5" marker-end="url(#ag)"/>

  <text x="345" y="330" font-size="9" fill="#374151">sessionStorage.setItem('token', jwt)</text>
  <line x1="340" y1="324" x2="758" y2="324" stroke="#374151" stroke-width="1.5" marker-end="url(#a)"/>

  <text x="345" y="350" font-size="9" fill="#374151">loggedIn$.next(true)</text>
  <line x1="338" y1="344" x2="102" y2="344" stroke="#374151" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="110" y="362" font-size="9" fill="#16A34A">→ Router navigates to returnUrl</text>

  <!-- ── SCENARIO C: token renewal ── -->
  <rect x="10" y="378" width="840" height="16" rx="3" fill="#FEF9C3"/>
  <text x="430" y="390" text-anchor="middle" font-size="10" font-weight="bold" fill="#713F12">Scenario C — Automatic token renewal (triggered by isLoggedIn() checks)</text>

  <text x="110" y="416" font-size="9" fill="#374151">any route navigation / API call</text>
  <line x1="100" y1="410" x2="338" y2="410" stroke="#374151" stroke-width="1.5" marker-end="url(#a)"/>

  <text x="345" y="430" font-size="9" fill="#374151">isLoggedIn(): renewAfter &lt; now?</text>
  <line x1="340" y1="426" x2="340" y2="436" stroke="#374151" stroke-width="1"/>

  <text x="345" y="456" font-size="9" fill="#374151">PUT /api/authenticate/renew  (Bearer old token)</text>
  <line x1="340" y1="450" x2="578" y2="450" stroke="#374151" stroke-width="1.5" marker-end="url(#a)"/>

  <text x="345" y="476" font-size="9" fill="#16A34A">200 OK  {token: "eyJ..." (new)}</text>
  <line x1="578" y1="470" x2="342" y2="470" stroke="#16A34A" stroke-width="1.5" marker-end="url(#ag)"/>

  <text x="345" y="494" font-size="9" fill="#374151">sessionStorage.setItem('token', newJwt)</text>
  <line x1="340" y1="488" x2="758" y2="488" stroke="#374151" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="80" y="508" font-size="9" fill="#78350F">→ Renewal at 50% of TTL.  isRenewing flag prevents concurrent renewals.</text>

  <!-- ── SCENARIO D: logout ── -->
  <rect x="10" y="524" width="840" height="16" rx="3" fill="#F1F5F9"/>
  <text x="430" y="536" text-anchor="middle" font-size="10" font-weight="bold" fill="#334155">Scenario D — Logout</text>

  <text x="110" y="562" font-size="9" fill="#374151">logout button clicked</text>
  <line x1="100" y1="556" x2="338" y2="556" stroke="#374151" stroke-width="1.5" marker-end="url(#a)"/>

  <text x="345" y="576" font-size="9" fill="#374151">sessionStorage.removeItem('token')</text>
  <line x1="340" y1="570" x2="758" y2="570" stroke="#374151" stroke-width="1.5" marker-end="url(#a)"/>

  <text x="345" y="596" font-size="9" fill="#374151">loggedIn$.next(false)</text>
  <line x1="338" y1="590" x2="102" y2="590" stroke="#374151" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="80" y="610" font-size="9" fill="#DC2626">→ TopNav observes loggedIn$, shows login link.</text>

  <!-- Notes panel -->
  <rect x="10" y="614" width="840" height="24" rx="3" fill="#F3F4F6"/>
  <text x="430" y="630" text-anchor="middle" font-size="9" fill="#6B7280">Salt used: "shNG0160$"  |  Token lives in sessionStorage (cleared on tab close, not on reload)  |  Anonymous login: empty username/password hashes POSTed to same endpoint</text>
</svg>
