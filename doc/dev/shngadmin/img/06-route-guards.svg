<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 580" font-family="'Segoe UI',Arial,sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#374151"/>
    </marker>
    <marker id="ag" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#16A34A"/>
    </marker>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#DC2626"/>
    </marker>
    <marker id="ab" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563EB"/>
    </marker>
  </defs>
  <rect width="860" height="580" fill="#F9FAFB"/>
  <text x="430" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#111827">shngAdmin — Route Guard Logic</text>
  <text x="430" y="44" text-anchor="middle" font-size="10" fill="#6B7280">Every protected route runs appReadyGuard first, then authGuard.  Both are functional CanActivateFn guards.</text>

  <!-- Start -->
  <ellipse cx="430" cy="76" rx="90" ry="20" fill="#374151" stroke="#111827" stroke-width="1.5"/>
  <text x="430" y="81" text-anchor="middle" font-size="10" fill="#fff">User navigates to /route</text>

  <line x1="430" y1="96" x2="430" y2="116" stroke="#374151" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- appReadyGuard box -->
  <rect x="270" y="116" width="320" height="68" rx="6" fill="#FEF3C7" stroke="#FCD34D" stroke-width="2"/>
  <text x="430" y="136" text-anchor="middle" font-size="11" font-weight="bold" fill="#78350F">① appReadyGuard</text>
  <text x="430" y="152" text-anchor="middle" font-size="9" fill="#92400E">Subscribe to AppConfig.serverReady$ (emits when wsPort ≠ '').</text>
  <text x="430" y="165" text-anchor="middle" font-size="9" fill="#92400E">5 s timeout → falls back to snapshot (always passes). map(() =&gt; true).</text>
  <text x="430" y="178" text-anchor="middle" font-size="9" fill="#92400E">Purpose: delay until the full server config has been received.</text>

  <line x1="430" y1="184" x2="430" y2="204" stroke="#374151" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- authGuard box -->
  <rect x="270" y="204" width="320" height="80" rx="6" fill="#FCE7F3" stroke="#F9A8D4" stroke-width="2"/>
  <text x="430" y="224" text-anchor="middle" font-size="11" font-weight="bold" fill="#831843">② authGuard</text>
  <text x="430" y="240" text-anchor="middle" font-size="9" fill="#9D174D">Step 1: auth.isLoggedIn() → true?  Return true immediately (sync).</text>
  <text x="430" y="253" text-anchor="middle" font-size="9" fill="#9D174D">Step 2: subscribe to AppConfig.authReady$ (emits loginRequired flag).</text>
  <text x="430" y="266" text-anchor="middle" font-size="9" fill="#9D174D">3 s timeout → returns false (safe: redirects to login).</text>
  <text x="430" y="279" text-anchor="middle" font-size="9" fill="#9D174D">map: loginRequired=false → true.  loginRequired=true → redirect UrlTree.</text>

  <line x1="430" y1="284" x2="430" y2="304" stroke="#374151" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Decision diamond -->
  <polygon points="430,304 550,336 430,368 310,336" fill="#E0F2FE" stroke="#38BDF8" stroke-width="2"/>
  <text x="430" y="330" text-anchor="middle" font-size="10" font-weight="bold" fill="#0369A1">guard result?</text>
  <text x="430" y="346" text-anchor="middle" font-size="9" fill="#0369A1">true / UrlTree / false</text>

  <!-- true path → feature route loads -->
  <line x1="430" y1="368" x2="430" y2="400" stroke="#16A34A" stroke-width="2" marker-end="url(#ag)"/>
  <text x="442" y="388" font-size="9" fill="#16A34A">true</text>

  <rect x="300" y="400" width="260" height="48" rx="6" fill="#DCFCE7" stroke="#86EFAC" stroke-width="2"/>
  <text x="430" y="420" text-anchor="middle" font-size="11" font-weight="bold" fill="#14532D">Feature route activates</text>
  <text x="430" y="436" text-anchor="middle" font-size="9" fill="#166534">Lazy module chunk downloaded and rendered.</text>
  <text x="430" y="448" text-anchor="middle" font-size="9" fill="#166534">Component injected into &lt;router-outlet&gt;.</text>

  <!-- UrlTree path → redirect to /login -->
  <line x1="550" y1="336" x2="690" y2="336" stroke="#DC2626" stroke-width="2" marker-end="url(#ar)"/>
  <text x="620" y="328" text-anchor="middle" font-size="9" fill="#DC2626">UrlTree</text>

  <rect x="692" y="306" width="156" height="60" rx="6" fill="#FEE2E2" stroke="#FCA5A5" stroke-width="2"/>
  <text x="770" y="326" text-anchor="middle" font-size="10" font-weight="bold" fill="#991B1B">Redirect to /login</text>
  <text x="770" y="342" text-anchor="middle" font-size="9" fill="#B91C1C">?returnUrl=/original</text>
  <text x="770" y="356" text-anchor="middle" font-size="9" fill="#B91C1C">LoginComponent shown.</text>

  <!-- false path -->
  <line x1="310" y1="336" x2="130" y2="336" stroke="#DC2626" stroke-width="2" marker-end="url(#ar)"/>
  <text x="220" y="328" text-anchor="middle" font-size="9" fill="#DC2626">false (timeout)</text>

  <rect x="14" y="306" width="114" height="60" rx="6" fill="#FEE2E2" stroke="#FCA5A5" stroke-width="2"/>
  <text x="71" y="326" text-anchor="middle" font-size="10" font-weight="bold" fill="#991B1B">Navigation</text>
  <text x="71" y="342" text-anchor="middle" font-size="10" font-weight="bold" fill="#991B1B">blocked</text>
  <text x="71" y="358" text-anchor="middle" font-size="9" fill="#B91C1C">User stays on current URL.</text>

  <!-- Post-login flow -->
  <line x1="770" y1="366" x2="770" y2="416" stroke="#374151" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="692" y="416" width="156" height="72" rx="6" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1.5"/>
  <text x="770" y="436" text-anchor="middle" font-size="10" font-weight="bold" fill="#78350F">User logs in</text>
  <text x="770" y="452" text-anchor="middle" font-size="9" fill="#92400E">AuthService.login() posts</text>
  <text x="770" y="464" text-anchor="middle" font-size="9" fill="#92400E">hashed credentials.</text>
  <text x="770" y="476" text-anchor="middle" font-size="9" fill="#92400E">On success → navigate to</text>
  <text x="770" y="488" text-anchor="middle" font-size="9" fill="#92400E">returnUrl.</text>

  <!-- Data sources box -->
  <rect x="14" y="410" width="260" height="150" rx="6" fill="#F0F9FF" stroke="#BAE6FD" stroke-width="1.5"/>
  <text x="144" y="430" text-anchor="middle" font-size="11" font-weight="bold" fill="#0369A1">Where guard data comes from</text>

  <text x="24" y="450" font-size="9" fill="#0369A1">authReady$ populated by:</text>
  <text x="24" y="465" font-size="9" fill="#374151">  AppComponent.ngOnInit()</text>
  <text x="24" y="478" font-size="9" fill="#374151">    GET /api/server/  →  login_required field</text>
  <text x="24" y="491" font-size="9" fill="#374151">    AppConfig.patch({loginRequired})</text>
  <text x="24" y="504" font-size="9" fill="#374151">    BehaviorSubject emits → authReady$ fires</text>

  <text x="24" y="520" font-size="9" fill="#0369A1">serverReady$ populated by:</text>
  <text x="24" y="533" font-size="9" fill="#374151">  TopNavigation.ngOnInit()</text>
  <text x="24" y="546" font-size="9" fill="#374151">    GET /api/server/info  →  wsPort field</text>
  <text x="24" y="559" font-size="9" fill="#374151">    AppConfig.patch({wsPort})  →  emits</text>

  <!-- Routes list -->
  <rect x="300" y="464" width="380" height="108" rx="6" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1.5"/>
  <text x="490" y="482" text-anchor="middle" font-size="10" font-weight="bold" fill="#334155">Protected Routes (all have canActivate: [appReadyGuard, authGuard])</text>
  <text x="310" y="498" font-size="9" fill="#475569">/system    /services   /items     /logics</text>
  <text x="310" y="513" font-size="9" fill="#475569">/schedulers  /plugins   /scenes    /logs</text>
  <text x="310" y="530" font-size="9" fill="#6B7280">Open routes (no guards):</text>
  <text x="310" y="545" font-size="9" fill="#475569">/login   /**  (NotFoundComponent)</text>
  <text x="310" y="560" font-size="9" fill="#475569">/  (redirects to /system — redirect, not a component)</text>
</svg>
