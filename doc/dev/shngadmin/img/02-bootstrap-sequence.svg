<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 760" font-family="'Segoe UI',Arial,sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#374151"/>
    </marker>
    <marker id="arr-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563EB"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#16A34A"/>
    </marker>
    <marker id="arr-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#D97706"/>
    </marker>
  </defs>

  <rect width="960" height="760" fill="#F9FAFB"/>
  <text x="480" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#111827">shngAdmin — Application Bootstrap Sequence</text>
  <text x="480" y="46" text-anchor="middle" font-size="10" fill="#6B7280">What happens from browser load to the first feature page becoming visible</text>

  <!-- Left column — sequential steps -->
  <!-- 1 -->
  <rect x="20" y="64" width="200" height="52" rx="6" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1.5"/>
  <text x="120" y="84" text-anchor="middle" font-size="10" font-weight="bold" fill="#1E40AF">① Browser loads index.html</text>
  <text x="120" y="99" text-anchor="middle" font-size="9" fill="#1E3A8A">Angular injects runtime scripts.</text>
  <text x="120" y="111" text-anchor="middle" font-size="9" fill="#1E3A8A">Zone.js patches all async APIs.</text>

  <line x1="120" y1="116" x2="120" y2="136" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 2 -->
  <rect x="20" y="136" width="200" height="64" rx="6" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1.5"/>
  <text x="120" y="156" text-anchor="middle" font-size="10" font-weight="bold" fill="#1E40AF">② main.ts — bootstrapApplication</text>
  <text x="120" y="171" text-anchor="middle" font-size="9" fill="#1E3A8A">Registers root providers:</text>
  <text x="120" y="183" text-anchor="middle" font-size="9" fill="#1E3A8A">Router, JwtModule, Translate, PrimeNG…</text>
  <text x="120" y="195" text-anchor="middle" font-size="9" fill="#1E3A8A">Registers 2 APP_INITIALIZER factories.</text>

  <line x1="120" y1="200" x2="120" y2="220" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 3 -->
  <rect x="20" y="220" width="200" height="64" rx="6" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1.5"/>
  <text x="120" y="240" text-anchor="middle" font-size="10" font-weight="bold" fill="#1E40AF">③ AppConfigService init</text>
  <text x="120" y="255" text-anchor="middle" font-size="9" fill="#1E3A8A">BehaviorSubject starts with defaults.</text>
  <text x="120" y="267" text-anchor="middle" font-size="9" fill="#1E3A8A">Language seeded from localStorage</text>
  <text x="120" y="279" text-anchor="middle" font-size="9" fill="#1E3A8A">(UserPreferencesService).</text>

  <line x1="120" y1="284" x2="120" y2="304" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 4 -->
  <rect x="20" y="304" width="200" height="52" rx="6" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1.5"/>
  <text x="120" y="324" text-anchor="middle" font-size="10" font-weight="bold" fill="#1E40AF">④ ServerApiService init</text>
  <text x="120" y="339" text-anchor="middle" font-size="9" fill="#1E3A8A">Reads window.location → apiUrl.</text>
  <text x="120" y="351" text-anchor="middle" font-size="9" fill="#1E3A8A">Patches AppConfig. Heartbeat starts.</text>

  <line x1="120" y1="356" x2="120" y2="376" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 5 -->
  <rect x="20" y="376" width="200" height="52" rx="6" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1.5"/>
  <text x="120" y="396" text-anchor="middle" font-size="10" font-weight="bold" fill="#1E40AF">⑤ AppComponent.constructor</text>
  <text x="120" y="411" text-anchor="middle" font-size="9" fill="#1E3A8A">Applies saved language preference.</text>
  <text x="120" y="423" text-anchor="middle" font-size="9" fill="#1E3A8A">Adds en/de/fr, sets default lang.</text>

  <line x1="120" y1="428" x2="120" y2="448" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 6 -->
  <rect x="20" y="448" width="200" height="64" rx="6" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1.5"/>
  <text x="120" y="468" text-anchor="middle" font-size="10" font-weight="bold" fill="#14532D">⑥ AppComponent.ngOnInit</text>
  <text x="120" y="483" text-anchor="middle" font-size="9" fill="#166534">Subscribes to NavigationEnd.</text>
  <text x="120" y="495" text-anchor="middle" font-size="9" fill="#166534">Strips _cb param from URL bar via</text>
  <text x="120" y="507" text-anchor="middle" font-size="9" fill="#166534">Location.replaceState() (no nav).</text>

  <line x1="120" y1="512" x2="120" y2="532" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 7 -->
  <rect x="20" y="532" width="200" height="52" rx="6" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1.5"/>
  <text x="120" y="552" text-anchor="middle" font-size="10" font-weight="bold" fill="#14532D">⑦ Router navigates to "/"</text>
  <text x="120" y="567" text-anchor="middle" font-size="9" fill="#166534">Redirected to /system by default</text>
  <text x="120" y="579" text-anchor="middle" font-size="9" fill="#166534">route configuration.</text>

  <!-- APP_INITIALIZER parallel track (centre-left) -->
  <rect x="240" y="304" width="220" height="80" rx="6" fill="#DBEAFE" stroke="#60A5FA" stroke-width="1.5"/>
  <text x="350" y="322" text-anchor="middle" font-size="10" font-weight="bold" fill="#1E40AF">APP_INITIALIZER ①</text>
  <text x="350" y="337" text-anchor="middle" font-size="9" fill="#1E3A8A">getServerBasicinfo()</text>
  <text x="350" y="350" text-anchor="middle" font-size="9" fill="#1E3A8A">GET /api/server/ → loginRequired,</text>
  <text x="350" y="363" text-anchor="middle" font-size="9" fill="#1E3A8A">wsHost, language. Patches AppConfig.</text>
  <text x="350" y="376" text-anchor="middle" font-size="9" fill="#1E3A8A">→ authReady$ emits.</text>

  <!-- APP_INITIALIZER parallel track (centre-right) -->
  <rect x="474" y="304" width="220" height="80" rx="6" fill="#DBEAFE" stroke="#60A5FA" stroke-width="1.5"/>
  <text x="584" y="322" text-anchor="middle" font-size="10" font-weight="bold" fill="#1E40AF">APP_INITIALIZER ②</text>
  <text x="584" y="337" text-anchor="middle" font-size="9" fill="#1E3A8A">checkForUpdate()</text>
  <text x="584" y="350" text-anchor="middle" font-size="9" fill="#1E3A8A">HEAD {baseURI}index.html (no-store).</text>
  <text x="584" y="363" text-anchor="middle" font-size="9" fill="#1E3A8A">Compare ETag to localStorage fingerprint.</text>
  <text x="584" y="376" text-anchor="middle" font-size="9" fill="#1E3A8A">Changed → reload with ?_cb=timestamp.</text>

  <!-- Arrow from 4 to APP_INITIALIZER block (parallel) -->
  <line x1="220" y1="330" x2="238" y2="344" stroke="#16A34A" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-green)"/>
  <text x="229" y="334" font-size="8" fill="#16A34A">parallel</text>
  <line x1="220" y1="330" x2="472" y2="344" stroke="#16A34A" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-green)"/>

  <!-- TopNav parallel track -->
  <rect x="708" y="376" width="216" height="80" rx="6" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1.5"/>
  <text x="816" y="396" text-anchor="middle" font-size="10" font-weight="bold" fill="#166534">TopNavigationComponent init</text>
  <text x="816" y="412" text-anchor="middle" font-size="9" fill="#166534">GET /api/server/info → full config.</text>
  <text x="816" y="424" text-anchor="middle" font-size="9" fill="#166534">Patches wsPort, tz, branches etc.</text>
  <text x="816" y="436" text-anchor="middle" font-size="9" fill="#166534">→ serverReady$ emits.</text>
  <text x="816" y="448" text-anchor="middle" font-size="9" fill="#166534">WebsocketPluginService connects WS.</text>

  <!-- AuthService parallel track -->
  <rect x="708" y="476" width="216" height="80" rx="6" fill="#FCE7F3" stroke="#F9A8D4" stroke-width="1.5"/>
  <text x="816" y="496" text-anchor="middle" font-size="10" font-weight="bold" fill="#831843">AuthService init (constructor)</text>
  <text x="816" y="512" text-anchor="middle" font-size="9" fill="#9D174D">Checks sessionStorage for saved JWT.</text>
  <text x="816" y="524" text-anchor="middle" font-size="9" fill="#9D174D">If valid → loggedIn$ emits true</text>
  <text x="816" y="536" text-anchor="middle" font-size="9" fill="#9D174D">without a network round-trip.</text>
  <text x="816" y="548" text-anchor="middle" font-size="9" fill="#9D174D">Else: anonymous login via /api/auth.</text>

  <!-- Guards column -->
  <!-- 8 appReadyGuard -->
  <rect x="240" y="532" width="210" height="64" rx="6" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1.5"/>
  <text x="345" y="552" text-anchor="middle" font-size="10" font-weight="bold" fill="#78350F">⑧ appReadyGuard</text>
  <text x="345" y="567" text-anchor="middle" font-size="9" fill="#92400E">Waits for AppConfig.serverReady$</text>
  <text x="345" y="579" text-anchor="middle" font-size="9" fill="#92400E">(wsPort populated by TopNav's</text>
  <text x="345" y="591" text-anchor="middle" font-size="9" fill="#92400E">getServerinfo call). 5 s timeout.</text>

  <!-- 9 authGuard -->
  <rect x="460" y="532" width="210" height="64" rx="6" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1.5"/>
  <text x="565" y="552" text-anchor="middle" font-size="10" font-weight="bold" fill="#78350F">⑨ authGuard</text>
  <text x="565" y="567" text-anchor="middle" font-size="9" fill="#92400E">Already logged in? → pass.</text>
  <text x="565" y="579" text-anchor="middle" font-size="9" fill="#92400E">Waits for authReady$ (loginRequired</text>
  <text x="565" y="591" text-anchor="middle" font-size="9" fill="#92400E">flag). No auth req? → pass. Else → /login.</text>

  <!-- 10 Lazy module -->
  <rect x="240" y="616" width="430" height="52" rx="6" fill="#EDE9FE" stroke="#C4B5FD" stroke-width="1.5"/>
  <text x="455" y="636" text-anchor="middle" font-size="10" font-weight="bold" fill="#4C1D95">⑩ Lazy feature module loads</text>
  <text x="455" y="651" text-anchor="middle" font-size="9" fill="#5B21B6">Angular downloads the JS chunk for system / items / logics / etc.</text>
  <text x="455" y="663" text-anchor="middle" font-size="9" fill="#5B21B6">SystemComponent and ItemTreeComponent wait for serverReady$ before connecting WebSocket.</text>

  <!-- Arrows -->
  <!-- 5 → TopNav (render parallel) -->
  <line x1="220" y1="402" x2="706" y2="408" stroke="#16A34A" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-green)"/>
  <text x="460" y="400" text-anchor="middle" font-size="8" fill="#16A34A">renders (parallel)</text>

  <!-- 7 → 8 -->
  <line x1="220" y1="558" x2="238" y2="558" stroke="#2563EB" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <!-- 8 → 10 -->
  <line x1="345" y1="596" x2="395" y2="614" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 9 → 10 -->
  <line x1="565" y1="596" x2="515" y2="614" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- TopNav → appReadyGuard unblocks -->
  <line x1="708" y1="428" x2="452" y2="558" stroke="#D97706" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-orange)"/>
  <text x="600" y="498" font-size="8" fill="#D97706">serverReady$</text>

  <!-- APP_INITIALIZER ① authReady$ → authGuard -->
  <line x1="350" y1="384" x2="540" y2="532" stroke="#D97706" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-orange)"/>
  <text x="408" y="460" font-size="8" fill="#D97706">authReady$</text>

  <!-- AuthService → authGuard unblocks (also) -->
  <line x1="708" y1="522" x2="672" y2="560" stroke="#D97706" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-orange)"/>

  <!-- legend -->
  <rect x="20" y="692" width="220" height="58" rx="4" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1"/>
  <text x="30" y="708" font-size="9" font-weight="bold" fill="#374151">Legend</text>
  <line x1="30" y1="720" x2="70" y2="720" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="75" y="724" font-size="9" fill="#374151">Sequential step</text>
  <line x1="30" y1="736" x2="70" y2="736" stroke="#16A34A" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-green)"/>
  <text x="75" y="740" font-size="9" fill="#374151">Parallel / async</text>
  <line x1="150" y1="720" x2="190" y2="720" stroke="#D97706" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-orange)"/>
  <text x="195" y="724" font-size="9" fill="#374151">Unblocks</text>
</svg>
