<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" font-family="'Segoe UI',Arial,sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#6B7280"/>
    </marker>
  </defs>
  <rect width="960" height="620" fill="#F9FAFB"/>
  <text x="480" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#111827">shngAdmin — Service Dependency Map</text>
  <text x="480" y="41" text-anchor="middle" font-size="10" fill="#6B7280">Arrows point from dependent → dependency.  All services are singletons (providedIn: 'root') unless noted.</text>

  <!-- Central config service -->
  <rect x="370" y="58" width="220" height="64" rx="7" fill="#1D4ED8" stroke="#1E40AF" stroke-width="2"/>
  <text x="480" y="80" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">AppConfigService</text>
  <text x="480" y="96" text-anchor="middle" font-size="9" fill="#BFDBFE">Central reactive config store.</text>
  <text x="480" y="110" text-anchor="middle" font-size="9" fill="#BFDBFE">BehaviorSubject&lt;AppConfig&gt; — safe defaults.</text>

  <!-- UserPreferencesService -->
  <rect x="700" y="58" width="200" height="52" rx="6" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1.5"/>
  <text x="800" y="78" text-anchor="middle" font-size="10" font-weight="bold" fill="#334155">UserPreferencesService</text>
  <text x="800" y="93" text-anchor="middle" font-size="9" fill="#475569">Reads/writes localStorage.</text>
  <text x="800" y="105" text-anchor="middle" font-size="9" fill="#475569">Language preference key.</text>
  <!-- UserPrefs → AppConfig -->
  <line x1="700" y1="84" x2="592" y2="84" stroke="#6B7280" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- LogService -->
  <rect x="60" y="58" width="200" height="52" rx="6" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1.5"/>
  <text x="160" y="78" text-anchor="middle" font-size="10" font-weight="bold" fill="#334155">LogService</text>
  <text x="160" y="93" text-anchor="middle" font-size="9" fill="#475569">Wraps console.log/warn/error.</text>
  <text x="160" y="105" text-anchor="middle" font-size="9" fill="#475569">Silent in production.</text>

  <!-- ServerApiService -->
  <rect x="60" y="164" width="200" height="88" rx="6" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1.5"/>
  <text x="160" y="184" text-anchor="middle" font-size="10" font-weight="bold" fill="#78350F">ServerApiService</text>
  <text x="160" y="199" text-anchor="middle" font-size="9" fill="#92400E">Bootstrap: GET /api/server/ (APP_INIT)</text>
  <text x="160" y="212" text-anchor="middle" font-size="9" fill="#92400E">Stale check: HEAD index.html (APP_INIT)</text>
  <text x="160" y="225" text-anchor="middle" font-size="9" fill="#92400E">Full config: GET /api/server/info</text>
  <text x="160" y="237" text-anchor="middle" font-size="9" fill="#92400E">Restart, backup/restore download.</text>
  <text x="160" y="249" text-anchor="middle" font-size="9" fill="#92400E">Patches AppConfig on response.</text>
  <!-- ServerApi → AppConfig -->
  <line x1="260" y1="208" x2="370" y2="100" stroke="#6B7280" stroke-width="1.5" marker-end="url(#a)"/>
  <!-- ServerApi → Log -->
  <line x1="160" y1="164" x2="160" y2="112" stroke="#6B7280" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- AuthService -->
  <rect x="370" y="164" width="220" height="88" rx="6" fill="#FCE7F3" stroke="#F9A8D4" stroke-width="1.5"/>
  <text x="480" y="184" text-anchor="middle" font-size="10" font-weight="bold" fill="#831843">AuthService</text>
  <text x="480" y="199" text-anchor="middle" font-size="9" fill="#9D174D">JWT in sessionStorage.</text>
  <text x="480" y="212" text-anchor="middle" font-size="9" fill="#9D174D">login(), logout(), isLoggedIn().</text>
  <text x="480" y="225" text-anchor="middle" font-size="9" fill="#9D174D">Auto-renewal at 50% TTL.</text>
  <text x="480" y="238" text-anchor="middle" font-size="9" fill="#9D174D">loggedIn$: BehaviorSubject&lt;boolean&gt;.</text>
  <text x="480" y="248" text-anchor="middle" font-size="8.5" fill="#9D174D">Uses JwtHelperService (@auth0/angular-jwt).</text>
  <!-- Auth → AppConfig -->
  <line x1="480" y1="164" x2="480" y2="122" stroke="#6B7280" stroke-width="1.5" marker-end="url(#a)"/>
  <!-- Auth → Log -->
  <line x1="370" y1="220" x2="262" y2="200" stroke="#6B7280" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ConnectivityService -->
  <rect x="700" y="164" width="200" height="88" rx="6" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1.5"/>
  <text x="800" y="184" text-anchor="middle" font-size="10" font-weight="bold" fill="#78350F">ConnectivityService</text>
  <text x="800" y="199" text-anchor="middle" font-size="9" fill="#92400E">Heartbeat GET /api/server/ every 10 s.</text>
  <text x="800" y="212" text-anchor="middle" font-size="9" fill="#92400E">Offline debounce: 1.5 s.</text>
  <text x="800" y="225" text-anchor="middle" font-size="9" fill="#92400E">Backoff retry: 2→4→8→16→30 s.</text>
  <text x="800" y="238" text-anchor="middle" font-size="9" fill="#92400E">online$, retryIn$: observables.</text>
  <text x="800" y="250" text-anchor="middle" font-size="9" fill="#92400E">Starts after AppConfig.ready$.</text>
  <!-- Connectivity → AppConfig -->
  <line x1="800" y1="164" x2="590" y2="100" stroke="#6B7280" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- SharedService -->
  <rect x="370" y="302" width="220" height="64" rx="6" fill="#EDE9FE" stroke="#C4B5FD" stroke-width="1.5"/>
  <text x="480" y="322" text-anchor="middle" font-size="10" font-weight="bold" fill="#4C1D95">SharedService</text>
  <text x="480" y="337" text-anchor="middle" font-size="9" fill="#5B21B6">setGuiLanguage() — sets ngx-translate lang</text>
  <text x="480" y="350" text-anchor="middle" font-size="9" fill="#5B21B6">from AppConfig + server preference.</text>
  <text x="480" y="362" text-anchor="middle" font-size="9" fill="#5B21B6">getIconForItem() helper.</text>
  <!-- Shared → AppConfig -->
  <line x1="480" y1="302" x2="480" y2="252" stroke="#6B7280" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- WebsocketService -->
  <rect x="60" y="302" width="200" height="76" rx="6" fill="#EDE9FE" stroke="#C4B5FD" stroke-width="1.5"/>
  <text x="160" y="322" text-anchor="middle" font-size="10" font-weight="bold" fill="#4C1D95">WebsocketService</text>
  <text x="160" y="337" text-anchor="middle" font-size="9" fill="#5B21B6">Raw WS connection to /adm.</text>
  <text x="160" y="350" text-anchor="middle" font-size="9" fill="#5B21B6">Auto-reconnect with backoff.</text>
  <text x="160" y="363" text-anchor="middle" font-size="9" fill="#5B21B6">Message queue while offline.</text>
  <text x="160" y="376" text-anchor="middle" font-size="9" fill="#5B21B6">messages$, open$: Observables.</text>
  <!-- WS → Log -->
  <line x1="160" y1="302" x2="160" y2="112" stroke="#6B7280" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- WebsocketPluginService -->
  <rect x="60" y="426" width="200" height="100" rx="6" fill="#EDE9FE" stroke="#C4B5FD" stroke-width="1.5"/>
  <text x="160" y="446" text-anchor="middle" font-size="10" font-weight="bold" fill="#4C1D95">WebsocketPluginService</text>
  <text x="160" y="461" text-anchor="middle" font-size="8.5" fill="#5B21B6">Domain protocol over WebsocketService.</text>
  <text x="160" y="474" text-anchor="middle" font-size="8.5" fill="#5B21B6">Sends identity, monitor, series cmds.</text>
  <text x="160" y="487" text-anchor="middle" font-size="8.5" fill="#5B21B6">Parses incoming JSON messages.</text>
  <text x="160" y="500" text-anchor="middle" font-size="8.5" fill="#5B21B6">BehaviorSubjects: systemload, memory,</text>
  <text x="160" y="513" text-anchor="middle" font-size="8.5" fill="#5B21B6">  swap, disk, threads, workerThreads.</text>
  <text x="160" y="526" text-anchor="middle" font-size="8" fill="#5B21B6">NOT providedIn:'root' — root-provided in main.ts</text>
  <!-- WsPlugin → WsService -->
  <line x1="160" y1="426" x2="160" y2="378" stroke="#6B7280" stroke-width="1.5" marker-end="url(#a)"/>
  <!-- WsPlugin → AppConfig -->
  <line x1="260" y1="468" x2="370" y2="120" stroke="#6B7280" stroke-width="1.5" marker-end="url(#a)"/>
  <!-- WsPlugin → Log -->
  <line x1="200" y1="426" x2="200" y2="112" stroke="#6B7280" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#a)"/>

  <!-- Domain API services box -->
  <rect x="490" y="302" width="410" height="224" rx="6" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1.5"/>
  <text x="695" y="322" text-anchor="middle" font-size="11" font-weight="bold" fill="#14532D">Domain API Services</text>
  <text x="695" y="336" text-anchor="middle" font-size="8.5" fill="#166534">Each wraps HttpClient calls for one backend domain.  Inject whichever you need.</text>

  <text x="515" y="358" font-size="9" fill="#065F46">ItemsApiService       — /api/items/, /api/items/tree</text>
  <text x="515" y="374" font-size="9" fill="#065F46">LogicsApiService      — /api/logics/  (CRUD + groups)</text>
  <text x="515" y="390" font-size="9" fill="#065F46">PluginsApiService     — /api/plugins/  (install/config)</text>
  <text x="515" y="406" font-size="9" fill="#065F46">ScenesApiService      — /api/scenes/</text>
  <text x="515" y="422" font-size="9" fill="#065F46">SchedulersApiService  — /api/schedulers/</text>
  <text x="515" y="438" font-size="9" fill="#065F46">ThreadsApiService     — /api/threads/</text>
  <text x="515" y="454" font-size="9" fill="#065F46">LogsApiService        — /api/logs/</text>
  <text x="515" y="470" font-size="9" fill="#065F46">LoggersApiService     — /api/loggers/</text>
  <text x="515" y="486" font-size="9" fill="#065F46">FilesApiService       — /api/files/</text>
  <text x="515" y="502" font-size="9" fill="#065F46">ConfigApiService      — /api/config/</text>
  <text x="515" y="518" font-size="9" fill="#065F46">ServicesApiService    — /api/services/ (YAML check, eval)</text>
  <text x="515" y="534" font-size="9" fill="#065F46">FunctionsApiService   — /api/functions/</text>

  <!-- arrows from domain services up to AppConfig -->
  <line x1="695" y1="302" x2="590" y2="122" stroke="#6B7280" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- connectivity interceptor note -->
  <rect x="370" y="418" width="106" height="64" rx="5" fill="#FEF9C3" stroke="#FDE047" stroke-width="1.5"/>
  <text x="423" y="436" text-anchor="middle" font-size="9" font-weight="bold" fill="#713F12">Connectivity</text>
  <text x="423" y="450" text-anchor="middle" font-size="9" font-weight="bold" fill="#713F12">Interceptor</text>
  <text x="423" y="466" text-anchor="middle" font-size="8" fill="#78350F">Calls markOffline() /</text>
  <text x="423" y="478" text-anchor="middle" font-size="8" fill="#78350F">cancelOfflineDebounce()</text>
  <!-- interceptor → connectivity -->
  <line x1="423" y1="418" x2="723" y2="252" stroke="#6B7280" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#a)"/>

  <!-- JWT interceptor note -->
  <rect x="240" y="418" width="112" height="64" rx="5" fill="#FEF9C3" stroke="#FDE047" stroke-width="1.5"/>
  <text x="296" y="436" text-anchor="middle" font-size="9" font-weight="bold" fill="#713F12">JWT Interceptor</text>
  <text x="296" y="452" text-anchor="middle" font-size="8" fill="#78350F">(@auth0/angular-jwt)</text>
  <text x="296" y="468" text-anchor="middle" font-size="8" fill="#78350F">Adds Authorization: Bearer</text>
  <text x="296" y="480" text-anchor="middle" font-size="8" fill="#78350F">to same-host API calls.</text>
  <!-- JWT interceptor → AuthService -->
  <line x1="296" y1="418" x2="420" y2="252" stroke="#6B7280" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#a)"/>

  <!-- MessageService note -->
  <rect x="700" y="418" width="200" height="52" rx="5" fill="#FEF9C3" stroke="#FDE047" stroke-width="1.5"/>
  <text x="800" y="436" text-anchor="middle" font-size="9" font-weight="bold" fill="#713F12">MessageService (PrimeNG)</text>
  <text x="800" y="452" text-anchor="middle" font-size="8" fill="#78350F">Root-provided toast bus.</text>
  <text x="800" y="464" text-anchor="middle" font-size="8" fill="#78350F">LogicsApi + ServicesComp fire toasts.</text>

  <!-- key at bottom -->
  <rect x="60" y="552" width="840" height="54" rx="5" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1"/>
  <text x="80" y="570" font-size="9" font-weight="bold" fill="#374151">Reading the map:</text>
  <text x="80" y="585" font-size="9" fill="#475569">Solid arrow = direct inject() dependency.  Dashed arrow = indirect / notification-only dependency.  All services are tree-shakeable singletons unless the box</text>
  <text x="80" y="598" font-size="9" fill="#475569">says otherwise.  Feature components inject only the domain API service(s) they need — they do not inject each other or AppConfigService directly.</text>
</svg>
