<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 520" font-family="'Segoe UI',Arial,sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#374151"/>
    </marker>
    <marker id="ab" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1D4ED8"/>
    </marker>
    <marker id="ag" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#16A34A"/>
    </marker>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#DC2626"/>
    </marker>
  </defs>
  <rect width="860" height="520" fill="#F9FAFB"/>
  <text x="430" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#111827">shngAdmin — HTTP Request Pipeline</text>
  <text x="430" y="44" text-anchor="middle" font-size="10" fill="#6B7280">Every HTTP call from any service flows through this chain before reaching the network</text>

  <!-- Service caller -->
  <rect x="20" y="60" width="160" height="52" rx="6" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1.5"/>
  <text x="100" y="80" text-anchor="middle" font-size="10" font-weight="bold" fill="#1E40AF">Domain API Service</text>
  <text x="100" y="95" text-anchor="middle" font-size="9" fill="#1E3A8A">e.g. ItemsApiService</text>
  <text x="100" y="108" text-anchor="middle" font-size="9" fill="#1E3A8A">this.http.get('/api/items/')</text>

  <line x1="180" y1="86" x2="218" y2="86" stroke="#374151" stroke-width="2" marker-end="url(#a)"/>

  <!-- Angular HttpClient -->
  <rect x="220" y="60" width="160" height="52" rx="6" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1.5"/>
  <text x="300" y="80" text-anchor="middle" font-size="10" font-weight="bold" fill="#334155">Angular HttpClient</text>
  <text x="300" y="95" text-anchor="middle" font-size="9" fill="#475569">Creates HttpRequest.</text>
  <text x="300" y="108" text-anchor="middle" font-size="9" fill="#475569">Chains interceptors.</text>

  <line x1="380" y1="86" x2="418" y2="86" stroke="#374151" stroke-width="2" marker-end="url(#a)"/>

  <!-- JWT interceptor -->
  <rect x="420" y="60" width="160" height="68" rx="6" fill="#FEF3C7" stroke="#FCD34D" stroke-width="2"/>
  <text x="500" y="80" text-anchor="middle" font-size="10" font-weight="bold" fill="#78350F">JWT Interceptor</text>
  <text x="500" y="95" text-anchor="middle" font-size="9" fill="#92400E">(@auth0/angular-jwt)</text>
  <text x="500" y="109" text-anchor="middle" font-size="9" fill="#92400E">allowedDomains: [hostname]</text>
  <text x="500" y="122" text-anchor="middle" font-size="9" fill="#92400E">Adds: Authorization: Bearer &lt;jwt&gt;</text>

  <line x1="580" y1="86" x2="618" y2="86" stroke="#374151" stroke-width="2" marker-end="url(#a)"/>

  <!-- Connectivity interceptor -->
  <rect x="620" y="60" width="160" height="80" rx="6" fill="#FEF3C7" stroke="#FCD34D" stroke-width="2"/>
  <text x="700" y="80" text-anchor="middle" font-size="10" font-weight="bold" fill="#78350F">Connectivity</text>
  <text x="700" y="94" text-anchor="middle" font-size="10" font-weight="bold" fill="#78350F">Interceptor</text>
  <text x="700" y="110" text-anchor="middle" font-size="9" fill="#92400E">On request: cancelOfflineDebounce()</text>
  <text x="700" y="123" text-anchor="middle" font-size="9" fill="#92400E">On error (status 0): markOffline()</text>
  <text x="700" y="136" text-anchor="middle" font-size="9" fill="#92400E">On success: (implicit OK)</text>

  <!-- Network -->
  <line x1="780" y1="90" x2="818" y2="90" stroke="#374151" stroke-width="2" marker-end="url(#a)"/>
  <rect x="820" y="68" width="30" height="44" rx="4" fill="#6B7280"/>
  <text x="835" y="92" text-anchor="middle" font-size="8" fill="#fff" writing-mode="tb">NET</text>

  <!-- Response path -->
  <text x="430" y="165" text-anchor="middle" font-size="11" font-weight="bold" fill="#374151">↓ Response flows back through interceptors in reverse order ↓</text>

  <!-- Success response -->
  <rect x="10" y="182" width="840" height="14" rx="2" fill="#DCFCE7"/>
  <text x="430" y="193" text-anchor="middle" font-size="9" font-weight="bold" fill="#14532D">Success path (HTTP 2xx)</text>

  <rect x="620" y="202" width="220" height="52" rx="6" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1.5"/>
  <text x="730" y="220" text-anchor="middle" font-size="9" fill="#14532D">Connectivity interceptor:</text>
  <text x="730" y="234" text-anchor="middle" font-size="9" fill="#14532D">cancelOfflineDebounce() — if server</text>
  <text x="730" y="248" text-anchor="middle" font-size="9" fill="#14532D">responds, we are clearly online.</text>

  <line x1="620" y1="228" x2="582" y2="228" stroke="#16A34A" stroke-width="2" marker-end="url(#ag)"/>

  <rect x="420" y="202" width="160" height="52" rx="6" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1.5"/>
  <text x="500" y="220" text-anchor="middle" font-size="9" fill="#14532D">JWT interceptor:</text>
  <text x="500" y="234" text-anchor="middle" font-size="9" fill="#14532D">passes response through</text>
  <text x="500" y="248" text-anchor="middle" font-size="9" fill="#14532D">unchanged.</text>

  <line x1="420" y1="228" x2="382" y2="228" stroke="#16A34A" stroke-width="2" marker-end="url(#ag)"/>

  <rect x="220" y="202" width="160" height="52" rx="6" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1.5"/>
  <text x="300" y="220" text-anchor="middle" font-size="9" fill="#14532D">HttpClient delivers</text>
  <text x="300" y="234" text-anchor="middle" font-size="9" fill="#14532D">Observable&lt;T&gt; to caller.</text>
  <text x="300" y="248" text-anchor="middle" font-size="9" fill="#14532D">subscribe() callback runs.</text>

  <line x1="220" y1="228" x2="182" y2="228" stroke="#16A34A" stroke-width="2" marker-end="url(#ag)"/>

  <rect x="20" y="202" width="160" height="52" rx="6" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1.5"/>
  <text x="100" y="222" text-anchor="middle" font-size="9" fill="#14532D">Service subscriber</text>
  <text x="100" y="237" text-anchor="middle" font-size="9" fill="#14532D">processes response,</text>
  <text x="100" y="251" text-anchor="middle" font-size="9" fill="#14532D">calls cdr.markForCheck().</text>

  <!-- Error response -->
  <rect x="10" y="270" width="840" height="14" rx="2" fill="#FEE2E2"/>
  <text x="430" y="281" text-anchor="middle" font-size="9" font-weight="bold" fill="#991B1B">Error path (network failure / HTTP 4xx 5xx)</text>

  <rect x="620" y="290" width="220" height="64" rx="6" fill="#FEE2E2" stroke="#FCA5A5" stroke-width="1.5"/>
  <text x="730" y="308" text-anchor="middle" font-size="9" fill="#991B1B">Connectivity interceptor:</text>
  <text x="730" y="322" text-anchor="middle" font-size="9" fill="#991B1B">status === 0 (network error)</text>
  <text x="730" y="336" text-anchor="middle" font-size="9" fill="#991B1B">→ markOffline() debounce timer.</text>
  <text x="730" y="350" text-anchor="middle" font-size="9" fill="#991B1B">re-throws error for caller.</text>

  <line x1="620" y1="322" x2="582" y2="322" stroke="#DC2626" stroke-width="2" marker-end="url(#ar)"/>

  <rect x="420" y="290" width="160" height="64" rx="6" fill="#FEE2E2" stroke="#FCA5A5" stroke-width="1.5"/>
  <text x="500" y="310" text-anchor="middle" font-size="9" fill="#991B1B">JWT interceptor:</text>
  <text x="500" y="326" text-anchor="middle" font-size="9" fill="#991B1B">passes error through</text>
  <text x="500" y="340" text-anchor="middle" font-size="9" fill="#991B1B">unchanged (no retry</text>
  <text x="500" y="352" text-anchor="middle" font-size="9" fill="#991B1B">logic here).</text>

  <line x1="420" y1="322" x2="382" y2="322" stroke="#DC2626" stroke-width="2" marker-end="url(#ar)"/>

  <rect x="20" y="290" width="360" height="64" rx="6" fill="#FEE2E2" stroke="#FCA5A5" stroke-width="1.5"/>
  <text x="200" y="310" text-anchor="middle" font-size="9" fill="#991B1B">Caller error handler:</text>
  <text x="200" y="326" text-anchor="middle" font-size="9" fill="#991B1B">LogicsApiService fires sticky toast via MessageService.</text>
  <text x="200" y="340" text-anchor="middle" font-size="9" fill="#991B1B">Other services log via LogService.</text>
  <text x="200" y="354" text-anchor="middle" font-size="9" fill="#991B1B">OfflineBanner shown by ConnectivityService.online$.</text>

  <!-- Additional notes -->
  <rect x="10" y="372" width="840" height="136" rx="6" fill="#F0F9FF" stroke="#BAE6FD" stroke-width="1.5"/>
  <text x="430" y="392" text-anchor="middle" font-size="11" font-weight="bold" fill="#0369A1">Additional HTTP details</text>

  <text x="24" y="412" font-size="9.5" font-weight="bold" fill="#0369A1">Base URL construction</text>
  <text x="24" y="427" font-size="9" fill="#374151">ServerApiService reads window.location at startup.  All API calls use relative paths like /api/items/ — the dev proxy (proxy.conf.js)</text>
  <text x="24" y="440" font-size="9" fill="#374151">forwards them to the real SHNG server during development.  In production, SHNG serves the Angular app and the API from the same origin.</text>

  <text x="24" y="460" font-size="9.5" font-weight="bold" fill="#0369A1">Interceptor registration</text>
  <text x="24" y="475" font-size="9" fill="#374151">JWT interceptor: registered via withInterceptorsFromDi() — part of JwtModule.forRoot(). Works with the class-based interceptor pattern.</text>
  <text x="24" y="488" font-size="9" fill="#374151">Connectivity interceptor: registered via withInterceptors([connectivityInterceptor]) — Angular 15+ functional interceptor pattern (preferred for new code).</text>

  <text x="24" y="508" font-size="9.5" font-weight="bold" fill="#0369A1">Observable subscription lifecycle</text>
  <text x="24" y="500" font-size="9" fill="#374151">All subscriptions use .pipe(takeUntilDestroyed(this.destroyRef)) — they auto-cancel when the component or service is destroyed, preventing memory leaks.</text>
</svg>
