<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="'Segoe UI',Arial,sans-serif">
  <rect width="900" height="560" fill="#F9FAFB"/>
  <text x="450" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#111827">shngAdmin — Component Tree &amp; Feature Modules</text>
  <text x="450" y="43" text-anchor="middle" font-size="10" fill="#6B7280">Angular renders a single page. The Router swaps feature content into the &lt;router-outlet&gt; slot.</text>

  <!-- ROOT -->
  <rect x="340" y="58" width="220" height="48" rx="6" fill="#1E40AF" stroke="#1E3A8A" stroke-width="2"/>
  <text x="450" y="78" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">AppComponent</text>
  <text x="450" y="94" text-anchor="middle" font-size="9" fill="#BFDBFE">Root shell — always present</text>

  <!-- connector lines from root -->
  <line x1="450" y1="106" x2="450" y2="122" stroke="#9CA3AF" stroke-width="1.5"/>
  <!-- horizontal bar -->
  <line x1="100" y1="122" x2="790" y2="122" stroke="#9CA3AF" stroke-width="1.5"/>
  <!-- verticals down to children -->
  <line x1="100" y1="122" x2="100" y2="138" stroke="#9CA3AF" stroke-width="1.5"/>
  <line x1="270" y1="122" x2="270" y2="138" stroke="#9CA3AF" stroke-width="1.5"/>
  <line x1="450" y1="122" x2="450" y2="138" stroke="#9CA3AF" stroke-width="1.5"/>
  <line x1="630" y1="122" x2="630" y2="138" stroke="#9CA3AF" stroke-width="1.5"/>
  <line x1="790" y1="122" x2="790" y2="138" stroke="#9CA3AF" stroke-width="1.5"/>

  <!-- Child components -->
  <rect x="30" y="138" width="140" height="52" rx="5" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1.5"/>
  <text x="100" y="158" text-anchor="middle" font-size="10" font-weight="bold" fill="#14532D">TopNavigation</text>
  <text x="100" y="172" text-anchor="middle" font-size="9" fill="#166534">Component</text>
  <text x="100" y="184" text-anchor="middle" font-size="8" fill="#166534">Menu, user info, WS connect</text>

  <rect x="200" y="138" width="140" height="52" rx="5" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1.5"/>
  <text x="270" y="158" text-anchor="middle" font-size="10" font-weight="bold" fill="#14532D">OfflineBanner</text>
  <text x="270" y="172" text-anchor="middle" font-size="9" fill="#166534">Component</text>
  <text x="270" y="184" text-anchor="middle" font-size="8" fill="#166534">Shows retry countdown</text>

  <rect x="380" y="138" width="140" height="52" rx="5" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1.5"/>
  <text x="450" y="158" text-anchor="middle" font-size="10" font-weight="bold" fill="#1E40AF">&lt;router-outlet&gt;</text>
  <text x="450" y="172" text-anchor="middle" font-size="9" fill="#1E3A8A">Lazy feature modules</text>
  <text x="450" y="184" text-anchor="middle" font-size="8" fill="#1E3A8A">loaded on demand</text>

  <rect x="560" y="138" width="140" height="52" rx="5" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1.5"/>
  <text x="630" y="158" text-anchor="middle" font-size="10" font-weight="bold" fill="#14532D">LoginComponent</text>
  <text x="630" y="172" text-anchor="middle" font-size="9" fill="#166534">Shown at /login</text>
  <text x="630" y="184" text-anchor="middle" font-size="8" fill="#166534">Not guarded</text>

  <rect x="720" y="138" width="140" height="52" rx="5" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1.5"/>
  <text x="790" y="158" text-anchor="middle" font-size="10" font-weight="bold" fill="#14532D">NotFound</text>
  <text x="790" y="172" text-anchor="middle" font-size="9" fill="#166534">Component</text>
  <text x="790" y="184" text-anchor="middle" font-size="8" fill="#166534">Catch-all / ** route</text>

  <!-- Feature modules from router-outlet -->
  <line x1="450" y1="190" x2="450" y2="214" stroke="#3B82F6" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="100" y1="214" x2="790" y2="214" stroke="#3B82F6" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- 8 feature module columns -->
  <!-- system -->
  <line x1="100" y1="214" x2="100" y2="230" stroke="#3B82F6" stroke-width="1"/>
  <rect x="28" y="230" width="144" height="110" rx="5" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1.5"/>
  <text x="100" y="250" text-anchor="middle" font-size="10" font-weight="bold" fill="#78350F">system/</text>
  <text x="100" y="265" text-anchor="middle" font-size="8.5" fill="#92400E">/system</text>
  <text x="100" y="280" text-anchor="middle" font-size="8" fill="#92400E">SystemComponent</text>
  <text x="100" y="295" text-anchor="middle" font-size="8" fill="#92400E">  CPU/RAM/disk charts</text>
  <text x="100" y="310" text-anchor="middle" font-size="8" fill="#92400E">  Thread overview</text>
  <text x="100" y="325" text-anchor="middle" font-size="8" fill="#92400E">  Realtime WS data</text>

  <!-- items -->
  <line x1="212" y1="214" x2="212" y2="230" stroke="#3B82F6" stroke-width="1"/>
  <rect x="140" y="230" width="144" height="110" rx="5" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1.5"/>
  <text x="212" y="250" text-anchor="middle" font-size="10" font-weight="bold" fill="#78350F">items/</text>
  <text x="212" y="265" text-anchor="middle" font-size="8.5" fill="#92400E">/items</text>
  <text x="212" y="280" text-anchor="middle" font-size="8" fill="#92400E">ItemsComponent</text>
  <text x="212" y="295" text-anchor="middle" font-size="8" fill="#92400E">  Item tree browser</text>
  <text x="212" y="310" text-anchor="middle" font-size="8" fill="#92400E">  Item detail/config</text>
  <text x="212" y="325" text-anchor="middle" font-size="8" fill="#92400E">  DynamicFieldComponent</text>

  <!-- logics -->
  <line x1="324" y1="214" x2="324" y2="230" stroke="#3B82F6" stroke-width="1"/>
  <rect x="252" y="230" width="144" height="110" rx="5" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1.5"/>
  <text x="324" y="250" text-anchor="middle" font-size="10" font-weight="bold" fill="#78350F">logics/</text>
  <text x="324" y="265" text-anchor="middle" font-size="8.5" fill="#92400E">/logics</text>
  <text x="324" y="280" text-anchor="middle" font-size="8" fill="#92400E">LogicsList, LogicsGroups</text>
  <text x="324" y="295" text-anchor="middle" font-size="8" fill="#92400E">  LogicsEdit (CodeMirror)</text>
  <text x="324" y="310" text-anchor="middle" font-size="8" fill="#92400E">  Watch items</text>
  <text x="324" y="325" text-anchor="middle" font-size="8" fill="#92400E">  Enable / trigger</text>

  <!-- schedulers -->
  <line x1="450" y1="214" x2="450" y2="230" stroke="#3B82F6" stroke-width="1"/>
  <rect x="372" y="230" width="156" height="110" rx="5" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1.5"/>
  <text x="450" y="250" text-anchor="middle" font-size="10" font-weight="bold" fill="#78350F">schedulers/</text>
  <text x="450" y="265" text-anchor="middle" font-size="8.5" fill="#92400E">/schedulers</text>
  <text x="450" y="280" text-anchor="middle" font-size="8" fill="#92400E">SchedulersList</text>
  <text x="450" y="295" text-anchor="middle" font-size="8" fill="#92400E">ThreadsList</text>
  <text x="450" y="310" text-anchor="middle" font-size="8" fill="#92400E">  Python threads table</text>
  <text x="450" y="325" text-anchor="middle" font-size="8" fill="#92400E">  Scheduler fire times</text>

  <!-- plugins -->
  <line x1="575" y1="214" x2="575" y2="230" stroke="#3B82F6" stroke-width="1"/>
  <rect x="532" y="230" width="86" height="110" rx="5" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1.5"/>
  <text x="575" y="250" text-anchor="middle" font-size="10" font-weight="bold" fill="#78350F">plugins/</text>
  <text x="575" y="265" text-anchor="middle" font-size="8.5" fill="#92400E">/plugins</text>
  <text x="575" y="280" text-anchor="middle" font-size="8" fill="#92400E">PluginsList</text>
  <text x="575" y="295" text-anchor="middle" font-size="8" fill="#92400E">Config dialog</text>
  <text x="575" y="310" text-anchor="middle" font-size="8" fill="#92400E">PyPI info</text>

  <!-- scenes -->
  <line x1="648" y1="214" x2="648" y2="230" stroke="#3B82F6" stroke-width="1"/>
  <rect x="622" y="230" width="80" height="110" rx="5" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1.5"/>
  <text x="662" y="250" text-anchor="middle" font-size="10" font-weight="bold" fill="#78350F">scenes/</text>
  <text x="662" y="265" text-anchor="middle" font-size="8.5" fill="#92400E">/scenes</text>
  <text x="662" y="280" text-anchor="middle" font-size="8" fill="#92400E">ScenesList</text>
  <text x="662" y="295" text-anchor="middle" font-size="8" fill="#92400E">Scene config</text>
  <text x="662" y="310" text-anchor="middle" font-size="8" fill="#92400E">YAML editor</text>

  <!-- logs -->
  <line x1="714" y1="214" x2="714" y2="230" stroke="#3B82F6" stroke-width="1"/>
  <rect x="704" y="230" width="80" height="110" rx="5" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1.5"/>
  <text x="744" y="250" text-anchor="middle" font-size="10" font-weight="bold" fill="#78350F">logs/</text>
  <text x="744" y="265" text-anchor="middle" font-size="8.5" fill="#92400E">/logs</text>
  <text x="744" y="280" text-anchor="middle" font-size="8" fill="#92400E">LogsList</text>
  <text x="744" y="295" text-anchor="middle" font-size="8" fill="#92400E">LogFile viewer</text>
  <text x="744" y="310" text-anchor="middle" font-size="8" fill="#92400E">Logger config</text>

  <!-- services -->
  <line x1="790" y1="214" x2="790" y2="230" stroke="#3B82F6" stroke-width="1"/>
  <rect x="790" y="230" width="96" height="110" rx="5" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1.5"/>
  <text x="838" y="250" text-anchor="middle" font-size="10" font-weight="bold" fill="#78350F">services/</text>
  <text x="838" y="265" text-anchor="middle" font-size="8.5" fill="#92400E">/services</text>
  <text x="838" y="280" text-anchor="middle" font-size="8" fill="#92400E">ServicesComponent</text>
  <text x="838" y="295" text-anchor="middle" font-size="8" fill="#92400E">  YAML checker</text>
  <text x="838" y="310" text-anchor="middle" font-size="8" fill="#92400E">  SHNG restart</text>
  <text x="838" y="325" text-anchor="middle" font-size="8" fill="#92400E">  Backup/restore</text>

  <!-- Shared components box -->
  <rect x="20" y="370" width="860" height="80" rx="6" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1.5"/>
  <text x="450" y="390" text-anchor="middle" font-size="11" font-weight="bold" fill="#334155">Shared Components (used across multiple feature modules)</text>
  <text x="230" y="410" text-anchor="middle" font-size="9.5" fill="#475569">CodeEditorComponent</text>
  <text x="230" y="424" text-anchor="middle" font-size="8.5" fill="#64748B">Wraps CodeMirror 6 — Python, YAML, JS, XML</text>
  <text x="450" y="410" text-anchor="middle" font-size="9.5" fill="#475569">DynamicFieldComponent</text>
  <text x="450" y="424" text-anchor="middle" font-size="8.5" fill="#64748B">Renders item attribute fields by type</text>
  <text x="670" y="410" text-anchor="middle" font-size="9.5" fill="#475569">OfflineBannerComponent</text>
  <text x="670" y="424" text-anchor="middle" font-size="8.5" fill="#64748B">Sticky banner when ConnectivityService reports offline</text>

  <!-- Note about OnPush -->
  <rect x="20" y="468" width="860" height="72" rx="6" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1.5"/>
  <text x="450" y="488" text-anchor="middle" font-size="11" font-weight="bold" fill="#065F46">Angular Change Detection: OnPush everywhere</text>
  <text x="450" y="508" text-anchor="middle" font-size="9" fill="#047857">Every component uses ChangeDetectionStrategy.OnPush.  Angular does NOT check the component on every browser event — it only</text>
  <text x="450" y="522" text-anchor="middle" font-size="9" fill="#047857">re-renders when an @Input reference changes, an Observable emits via async pipe, or the component calls cdr.markForCheck().</text>
  <text x="450" y="536" text-anchor="middle" font-size="9" fill="#047857">This makes the app fast but requires explicit cdr.markForCheck() after any imperative data update (e.g. in a subscribe callback).</text>
</svg>
