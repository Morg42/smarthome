<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 676" font-family="'Segoe UI',Arial,sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#374151"/>
    </marker>
    <marker id="av" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#7C3AED"/>
    </marker>
    <marker id="ao" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#D97706"/>
    </marker>
    <marker id="ag" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#16A34A"/>
    </marker>
  </defs>
  <rect width="900" height="676" fill="#F9FAFB"/>
  <text x="450" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#111827">shngAdmin — WebSocket Flow</text>
  <text x="450" y="44" text-anchor="middle" font-size="10" fill="#6B7280">Two-layer design: WebsocketService handles the raw connection; WebsocketPluginService speaks the SHNG domain protocol</text>

  <!-- Actors -->
  <text x="90" y="74" text-anchor="middle" font-size="10" font-weight="bold" fill="#4C1D95">WebsocketPlugin</text>
  <text x="90" y="86" text-anchor="middle" font-size="10" font-weight="bold" fill="#4C1D95">Service</text>
  <line x1="90" y1="90" x2="90" y2="654" stroke="#C4B5FD" stroke-width="1.5" stroke-dasharray="6,4"/>

  <text x="280" y="74" text-anchor="middle" font-size="10" font-weight="bold" fill="#4C1D95">WebsocketService</text>
  <text x="280" y="86" text-anchor="middle" font-size="10" font-weight="bold" fill="#4C1D95">(raw WS)</text>
  <line x1="280" y1="90" x2="280" y2="654" stroke="#C4B5FD" stroke-width="1.5" stroke-dasharray="6,4"/>

  <text x="560" y="74" text-anchor="middle" font-size="10" font-weight="bold" fill="#78350F">SHNG WS Server</text>
  <text x="560" y="86" text-anchor="middle" font-size="10" font-weight="bold" fill="#78350F">ws://host:port/adm</text>
  <line x1="560" y1="90" x2="560" y2="654" stroke="#FCD34D" stroke-width="1.5" stroke-dasharray="6,4"/>

  <text x="780" y="74" text-anchor="middle" font-size="10" font-weight="bold" fill="#065F46">System / Chart</text>
  <text x="780" y="86" text-anchor="middle" font-size="10" font-weight="bold" fill="#065F46">Components</text>
  <line x1="780" y1="90" x2="780" y2="654" stroke="#86EFAC" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Phase A: connection -->
  <rect x="10" y="100" width="880" height="14" rx="2" fill="#EDE9FE"/>
  <text x="450" y="111" text-anchor="middle" font-size="9" font-weight="bold" fill="#4C1D95">Phase A — Initial connection (TopNav, SystemComponent, and ItemTreeComponent each call connect() after serverReady$ emits)</text>

  <text x="96" y="134" font-size="9" fill="#374151">connect(ws://host:wsPort/adm)  — only after AppConfig.serverReady$ emits</text>
  <line x1="90" y1="128" x2="278" y2="128" stroke="#7C3AED" stroke-width="1.5" marker-end="url(#av)"/>

  <text x="286" y="148" font-size="9" fill="#374151">new WebSocket(url)</text>
  <line x1="280" y1="142" x2="558" y2="142" stroke="#7C3AED" stroke-width="1.5" marker-end="url(#av)"/>

  <text x="286" y="168" font-size="9" fill="#16A34A">ws.onopen fires</text>
  <line x1="558" y1="162" x2="282" y2="162" stroke="#16A34A" stroke-width="1.5" marker-end="url(#ag)"/>

  <text x="286" y="188" font-size="9" fill="#374151">open$ emits</text>
  <line x1="280" y1="182" x2="92" y2="182" stroke="#7C3AED" stroke-width="1.5" marker-end="url(#av)"/>

  <text x="96" y="208" font-size="9" fill="#374151">send identity {cmd:'identity', browser, ...}</text>
  <line x1="90" y1="202" x2="278" y2="202" stroke="#7C3AED" stroke-width="1.5" marker-end="url(#av)"/>
  <line x1="280" y1="202" x2="558" y2="202" stroke="#7C3AED" stroke-width="1.5" marker-end="url(#av)"/>

  <!-- Phase B: monitor subscription -->
  <rect x="10" y="218" width="880" height="14" rx="2" fill="#EDE9FE"/>
  <text x="450" y="229" text-anchor="middle" font-size="9" font-weight="bold" fill="#4C1D95">Phase B — Real-time item value subscription</text>

  <text x="96" y="252" font-size="9" fill="#374151">subscribeToItems(['item.path.one', ...])</text>
  <line x1="90" y1="246" x2="278" y2="246" stroke="#7C3AED" stroke-width="1.5" marker-end="url(#av)"/>

  <text x="286" y="268" font-size="9" fill="#374151">send {cmd:'monitor', items: [...], max_age: 0}</text>
  <line x1="280" y1="262" x2="558" y2="262" stroke="#7C3AED" stroke-width="1.5" marker-end="url(#av)"/>

  <text x="286" y="292" font-size="9" fill="#D97706">receive {cmd:'item', id:'item.path.one', val: 42.3, ...}</text>
  <line x1="558" y1="286" x2="282" y2="286" stroke="#D97706" stroke-width="1.5" marker-end="url(#ao)"/>

  <text x="286" y="308" font-size="9" fill="#374151">messages$ emits raw MessageEvent</text>
  <line x1="280" y1="302" x2="92" y2="302" stroke="#7C3AED" stroke-width="1.5" marker-end="url(#av)"/>

  <text x="96" y="324" font-size="9" fill="#374151">parse JSON, push to correct Subject</text>
  <line x1="90" y1="318" x2="90" y2="330" stroke="#374151" stroke-width="1"/>

  <text x="96" y="348" font-size="9" fill="#374151">systemload$.next(val) / memory$.next(val) / …</text>
  <line x1="90" y1="342" x2="778" y2="342" stroke="#7C3AED" stroke-width="1.5" marker-end="url(#av)"/>

  <text x="786" y="360" font-size="9" fill="#16A34A">chart updates in real time</text>

  <!-- Phase C: series request -->
  <rect x="10" y="370" width="880" height="14" rx="2" fill="#EDE9FE"/>
  <text x="450" y="381" text-anchor="middle" font-size="9" font-weight="bold" fill="#4C1D95">Phase C — Historical series data for charts</text>

  <text x="286" y="404" font-size="9" fill="#374151">send {cmd:'series', item:'systemload', start:'24h', end:'now', count:200}</text>
  <line x1="280" y1="398" x2="558" y2="398" stroke="#7C3AED" stroke-width="1.5" marker-end="url(#av)"/>

  <text x="286" y="428" font-size="9" fill="#D97706">receive {cmd:'series', item:'systemload', series: [[t1,v1],[t2,v2]...]}</text>
  <line x1="558" y1="422" x2="282" y2="422" stroke="#D97706" stroke-width="1.5" marker-end="url(#ao)"/>

  <text x="286" y="444" font-size="9" fill="#374151">convert timestamps (×1000 for JS Date), normalise memory (÷1 000 000)</text>
  <line x1="280" y1="440" x2="92" y2="440" stroke="#7C3AED" stroke-width="1.5" marker-end="url(#av)"/>

  <text x="96" y="460" font-size="9" fill="#374151">push series array to relevant Subject</text>
  <line x1="90" y1="456" x2="778" y2="456" stroke="#7C3AED" stroke-width="1.5" marker-end="url(#av)"/>

  <!-- Phase D: reconnect -->
  <rect x="10" y="470" width="880" height="14" rx="2" fill="#FEE2E2"/>
  <text x="450" y="481" text-anchor="middle" font-size="9" font-weight="bold" fill="#991B1B">Phase D — Connection lost and automatic reconnect</text>

  <text x="286" y="504" font-size="9" fill="#DC2626">ws.onclose fires (network error)</text>
  <line x1="558" y1="498" x2="282" y2="498" stroke="#DC2626" stroke-width="1.5" marker-end="url(#ar)" marker-start="none"/>
  <defs><marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#DC2626"/></marker></defs>

  <text x="286" y="524" font-size="9" fill="#374151">schedule reconnect after 2 s (backoff: 2→4→8→16→30 s)</text>
  <line x1="280" y1="518" x2="280" y2="530" stroke="#374151" stroke-width="1"/>

  <text x="286" y="548" font-size="9" fill="#374151">new WebSocket(reconnectUrl) — attempt ①②…</text>
  <line x1="280" y1="542" x2="558" y2="542" stroke="#7C3AED" stroke-width="1.5" marker-end="url(#av)"/>

  <text x="286" y="568" font-size="9" fill="#374151">on reconnect: flush messageQueue (buffered while offline)</text>
  <line x1="280" y1="564" x2="558" y2="564" stroke="#7C3AED" stroke-width="1.5" marker-end="url(#av)"/>

  <!-- Notes -->
  <rect x="10" y="586" width="880" height="80" rx="5" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1"/>
  <text x="20" y="604" font-size="9" font-weight="bold" fill="#374151">Key design decisions</text>
  <text x="20" y="620" font-size="9" fill="#475569">• WebsocketService uses NgZone.run() to ensure all WS callbacks re-enter Angular's change detection — without this, OnPush components would never update.</text>
  <text x="20" y="634" font-size="9" fill="#475569">• The message queue in WebsocketService buffers sendMessage() calls made while the socket is closed (e.g. during reconnect); they are flushed in order once onopen fires.</text>
  <text x="20" y="648" font-size="9" fill="#475569">• WebsocketPluginService is NOT providedIn:'root' — it is provided explicitly in main.ts so it is instantiated eagerly at bootstrap (not lazily on first injection).</text>
  <text x="20" y="662" font-size="9" fill="#475569">• SystemComponent and ItemTreeComponent subscribe to AppConfigService.serverReady$ (take 1) before calling connect(), ensuring wsPort is set and avoiding empty charts on first load.</text>
</svg>
