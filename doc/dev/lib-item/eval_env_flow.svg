<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 740" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#555"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#c0392b"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#27ae60"/>
    </marker>
    <marker id="arr-orange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#e67e22"/>
    </marker>
  </defs>

  <rect width="760" height="740" fill="#f8f9fa" rx="8"/>
  <text x="380" y="30" fill="#333" font-size="14" font-weight="bold" text-anchor="middle">eval() execution flow — explicit namespace + compat shim</text>

  <!-- 1. trigger -->
  <rect x="260" y="50" width="240" height="40" fill="#4a6fa5" rx="4"/>
  <text x="380" y="75" fill="white" font-size="12" text-anchor="middle">item eval triggered</text>

  <line x1="380" y1="90" x2="380" y2="118" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 2. make env -->
  <rect x="220" y="118" width="320" height="52" fill="#e8f0fe" stroke="#4a6fa5" stroke-width="1.5" rx="4"/>
  <text x="380" y="138" fill="#1a3a6e" font-size="12" text-anchor="middle" font-weight="bold">_make_eval_env(item, value, caller, …)</text>
  <text x="380" y="158" fill="#555" font-size="11" text-anchor="middle">→ returns explicit namespace dict</text>

  <line x1="380" y1="170" x2="380" y2="198" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 3. eval with ns -->
  <rect x="220" y="198" width="320" height="40" fill="#e8f5e9" stroke="#28a745" stroke-width="1.5" rx="4"/>
  <text x="380" y="223" fill="#155724" font-size="12" text-anchor="middle" font-weight="bold">eval(expr, _ns)</text>

  <!-- decision diamond -->
  <polygon points="380,258 460,296 380,334 300,296" fill="#fff8e1" stroke="#f0ad4e" stroke-width="1.5"/>
  <text x="380" y="292" fill="#856404" font-size="11" text-anchor="middle">success?</text>
  <text x="380" y="307" fill="#856404" font-size="10" text-anchor="middle">(no exception)</text>
  <line x1="380" y1="238" x2="380" y2="258" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- YES branch (right) -->
  <line x1="460" y1="296" x2="560" y2="296" stroke="#27ae60" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="508" y="288" fill="#27ae60" font-size="11" text-anchor="middle">yes</text>
  <rect x="560" y="272" width="160" height="48" fill="#e8f5e9" stroke="#28a745" stroke-width="1.5" rx="4"/>
  <text x="640" y="292" fill="#155724" font-size="11" text-anchor="middle">item._update_item(</text>
  <text x="640" y="308" fill="#155724" font-size="11" text-anchor="middle">  value, caller, …)</text>

  <!-- NO branch (down) -->
  <line x1="380" y1="334" x2="380" y2="362" stroke="#c0392b" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <text x="394" y="352" fill="#c0392b" font-size="11">no (exception)</text>

  <!-- COMPAT SHIM box -->
  <rect x="100" y="362" width="560" height="164" fill="#fffde7" stroke="#f0ad4e" stroke-width="2" rx="6" stroke-dasharray="6,3"/>
  <text x="380" y="382" fill="#856404" font-size="11" font-weight="bold" text-anchor="middle">⚠  COMPAT-SHIM  (remove with _eval_compat.py)</text>

  <!-- make legacy ns -->
  <rect x="220" y="392" width="320" height="40" fill="#fff3cd" stroke="#e67e22" stroke-width="1.5" rx="4"/>
  <text x="380" y="412" fill="#7d4e00" font-size="12" text-anchor="middle" font-weight="bold">_make_legacy_namespace(primary_ns)</text>
  <text x="380" y="428" fill="#7d4e00" font-size="10" text-anchor="middle">adds: os, re, sys, json, copy, threading, ast, inspect, tz</text>
  <line x1="380" y1="362" x2="380" y2="392" stroke="#e67e22" stroke-width="1.5" marker-end="url(#arr-orange)"/>

  <line x1="380" y1="432" x2="380" y2="452" stroke="#e67e22" stroke-width="1.5" marker-end="url(#arr-orange)"/>

  <!-- eval with legacy ns -->
  <rect x="220" y="452" width="320" height="36" fill="#fff3cd" stroke="#e67e22" stroke-width="1.5" rx="4"/>
  <text x="380" y="475" fill="#7d4e00" font-size="12" text-anchor="middle" font-weight="bold">eval(expr, legacy_ns)</text>

  <!-- second diamond -->
  <polygon points="380,508 460,538 380,568 300,538" fill="#fff8e1" stroke="#f0ad4e" stroke-width="1.5"/>
  <text x="380" y="534" fill="#856404" font-size="11" text-anchor="middle">success?</text>
  <line x1="380" y1="488" x2="380" y2="508" stroke="#e67e22" stroke-width="1.5" marker-end="url(#arr-orange)"/>

  <!-- YES (right) from second diamond — outside shim box -->
  <line x1="460" y1="538" x2="540" y2="538" stroke="#27ae60" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="500" y="530" fill="#27ae60" font-size="11" text-anchor="middle">yes</text>
  <rect x="540" y="514" width="180" height="60" fill="#e8f5e9" stroke="#28a745" stroke-width="1.5" rx="4"/>
  <text x="630" y="534" fill="#155724" font-size="11" text-anchor="middle">log WARNING:</text>
  <text x="630" y="550" fill="#155724" font-size="10" text-anchor="middle">"name 'X' not in std env</text>
  <text x="630" y="563" fill="#155724" font-size="10" text-anchor="middle"> … removed in future release"</text>
  <!-- arrow from warning box to update -->
  <line x1="630" y1="574" x2="630" y2="614" stroke="#27ae60" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <line x1="630" y1="614" x2="720" y2="614" stroke="#27ae60" stroke-width="1.5"/>
  <line x1="720" y1="296" x2="720" y2="614" stroke="#27ae60" stroke-width="1.5"/>
  <line x1="720" y1="296" x2="720" y2="296" stroke="#27ae60" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <!-- vertical connector to top success box -->
  <line x1="720" y1="296" x2="720" y2="296" stroke="#27ae60" stroke-width="0"/>

  <!-- NO (left/down) from second diamond -->
  <line x1="300" y1="538" x2="180" y2="538" stroke="#c0392b" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <text x="242" y="530" fill="#c0392b" font-size="11" text-anchor="middle">no</text>

  <!-- failure box — outside shim region -->
  <rect x="30" y="610" width="260" height="60" fill="#fce8e8" stroke="#d9534f" stroke-width="1.5" rx="4"/>
  <text x="160" y="633" fill="#721c24" font-size="11" text-anchor="middle">log WARNING (both failed):</text>
  <text x="160" y="649" fill="#721c24" font-size="11" text-anchor="middle">item value unchanged</text>
  <line x1="180" y1="538" x2="160" y2="538" stroke="#c0392b" stroke-width="0"/>
  <line x1="180" y1="538" x2="160" y2="538" stroke="#c0392b" stroke-width="1.5"/>
  <line x1="160" y1="538" x2="160" y2="610" stroke="#c0392b" stroke-width="1.5" marker-end="url(#arr-red)"/>

  <!-- cast-retry note (separate small note) -->
  <rect x="30" y="198" width="180" height="52" fill="#f0f4ff" stroke="#4a6fa5" stroke-width="1" rx="4" stroke-dasharray="4,2"/>
  <text x="120" y="216" fill="#4a6fa5" font-size="10" text-anchor="middle">cast-retry (run_eval only):</text>
  <text x="120" y="230" fill="#4a6fa5" font-size="10" text-anchor="middle">on exception, cast value</text>
  <text x="120" y="244" fill="#4a6fa5" font-size="10" text-anchor="middle">then retry eval once</text>
  <line x1="210" y1="220" x2="220" y2="220" stroke="#4a6fa5" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arr)"/>

</svg>
