<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 480" font-family="Helvetica, Arial, sans-serif">
  <rect width="700" height="480" fill="#f9f9f9"/>

  <!-- Title -->
  <text x="350" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#333">Proposed Architecture — Modular Design</text>

  <!-- ── __init__.py orchestrator ── -->
  <rect x="240" y="50" width="220" height="70" rx="6" fill="#e8f0fe" stroke="#4a86e8" stroke-width="2"/>
  <text x="350" y="75" text-anchor="middle" font-size="12" font-weight="bold" fill="#2a5db0">Database(SmartPlugin)</text>
  <text x="350" y="92" text-anchor="middle" font-size="10" fill="#555">__init__.py</text>
  <text x="350" y="108" text-anchor="middle" font-size="10" fill="#555">thin orchestrator · public API</text>

  <!-- ── utils.py ── -->
  <rect x="30"  y="200" width="140" height="65" rx="5" fill="#e6f4ea" stroke="#34a853" stroke-width="1.5"/>
  <text x="100" y="223" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e7e34">utils.py</text>
  <text x="100" y="240" text-anchor="middle" font-size="10" fill="#555">encode_value</text>
  <text x="100" y="255" text-anchor="middle" font-size="10" fill="#555">decode_value · to_timestamp</text>

  <!-- ── buffer.py ── -->
  <rect x="195" y="200" width="140" height="65" rx="5" fill="#fce8e6" stroke="#d93025" stroke-width="1.5"/>
  <text x="265" y="223" text-anchor="middle" font-size="11" font-weight="bold" fill="#b31412">buffer.py</text>
  <text x="265" y="240" text-anchor="middle" font-size="10" fill="#555">BufferManager</text>
  <text x="265" y="255" text-anchor="middle" font-size="10" fill="#555">push · pop_all · close_open</text>

  <!-- ── store.py ── -->
  <rect x="360" y="200" width="140" height="65" rx="5" fill="#fef7e0" stroke="#f9ab00" stroke-width="1.5"/>
  <text x="430" y="223" text-anchor="middle" font-size="11" font-weight="bold" fill="#9c6e00">store.py</text>
  <text x="430" y="240" text-anchor="middle" font-size="10" fill="#555">ItemStore · LogStore</text>
  <text x="430" y="255" text-anchor="middle" font-size="10" fill="#555">SQL CRUD only</text>

  <!-- ── query.py ── -->
  <rect x="525" y="200" width="140" height="65" rx="5" fill="#f3e8fd" stroke="#9334ea" stroke-width="1.5"/>
  <text x="595" y="223" text-anchor="middle" font-size="11" font-weight="bold" fill="#6b1dc2">query.py</text>
  <text x="595" y="240" text-anchor="middle" font-size="10" fill="#555">QueryEngine</text>
  <text x="595" y="255" text-anchor="middle" font-size="10" fill="#555">series() · single()</text>

  <!-- ── maintenance.py ── -->
  <rect x="278" y="330" width="145" height="65" rx="5" fill="#fce8e6" stroke="#d93025" stroke-width="1.5"/>
  <text x="350" y="353" text-anchor="middle" font-size="11" font-weight="bold" fill="#b31412">maintenance.py</text>
  <text x="350" y="370" text-anchor="middle" font-size="10" fill="#555">MaintenanceManager</text>
  <text x="350" y="385" text-anchor="middle" font-size="10" fill="#555">prune · remove_orphans</text>

  <!-- ── constants.py ── -->
  <rect x="455" y="330" width="120" height="65" rx="5" fill="#e8f0fe" stroke="#4a86e8" stroke-width="1.2" stroke-dasharray="5,3"/>
  <text x="515" y="353" text-anchor="middle" font-size="11" font-weight="bold" fill="#2a5db0">constants.py</text>
  <text x="515" y="370" text-anchor="middle" font-size="10" fill="#888">(existing)</text>

  <!-- ── lib/db.py ── external -->
  <rect x="100" y="330" width="140" height="65" rx="5" fill="#f0f0f0" stroke="#999" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="170" y="353" text-anchor="middle" font-size="11" font-weight="bold" fill="#555">lib/db.py</text>
  <text x="170" y="370" text-anchor="middle" font-size="10" fill="#888">Database connection</text>
  <text x="170" y="385" text-anchor="middle" font-size="10" fill="#888">(external, unchanged)</text>

  <!-- Arrows from orchestrator down to modules -->
  <!-- to utils -->
  <line x1="270" y1="120" x2="100" y2="200" stroke="#888" stroke-width="1.3" marker-end="url(#arr)"/>
  <!-- to buffer -->
  <line x1="310" y1="120" x2="265" y2="200" stroke="#888" stroke-width="1.3" marker-end="url(#arr)"/>
  <!-- to store -->
  <line x1="390" y1="120" x2="430" y2="200" stroke="#888" stroke-width="1.3" marker-end="url(#arr)"/>
  <!-- to query -->
  <line x1="440" y1="120" x2="595" y2="200" stroke="#888" stroke-width="1.3" marker-end="url(#arr)"/>
  <!-- to maintenance -->
  <line x1="350" y1="120" x2="350" y2="330" stroke="#888" stroke-width="1.3" stroke-dasharray="4,2" marker-end="url(#arr)"/>

  <!-- store → lib/db -->
  <line x1="380" y1="265" x2="240" y2="330" stroke="#ccc" stroke-width="1" marker-end="url(#arr)"/>
  <!-- maintenance → lib/db -->
  <line x1="300" y1="395" x2="240" y2="395" stroke="#ccc" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Arrowhead marker -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#888"/>
    </marker>
  </defs>

  <!-- Legend -->
  <text x="350" y="465" text-anchor="middle" font-size="10" fill="#888">Dashed arrows = indirect / scheduled use.  Public API preserved on Database class as delegates.</text>
</svg>
