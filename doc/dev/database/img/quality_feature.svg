<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 460" font-family="Helvetica, Arial, sans-serif">
  <rect width="760" height="460" fill="#f9f9f9"/>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L8,3.5 z" fill="#555"/>
    </marker>
    <marker id="arr-up" markerWidth="8" markerHeight="8" refX="3.5" refY="0" orient="auto">
      <path d="M0,8 L7,8 L3.5,0 z" fill="#555"/>
    </marker>
  </defs>

  <text x="380" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#333">val_quality — Gap Lifecycle on the Timeline</text>

  <!-- ── TIME AXIS ── -->
  <line x1="60" y1="200" x2="720" y2="200" stroke="#aaa" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="725" y="204" font-size="11" fill="#888">time</text>

  <!-- ── T0: last normal value ── -->
  <line x1="120" y1="185" x2="120" y2="215" stroke="#555" stroke-width="1.2"/>
  <text x="120" y="230" text-anchor="middle" font-size="10" fill="#555">T0</text>
  <!-- value bar before gap (quality=0, green) -->
  <rect x="60" y="155" width="120" height="40" rx="3" fill="#34a853" opacity="0.8"/>
  <text x="120" y="180" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">val=42  q=0</text>

  <!-- ── T1: db_mark_invalid() ── -->
  <line x1="240" y1="185" x2="240" y2="215" stroke="#d93025" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="240" y="230" text-anchor="middle" font-size="10" fill="#d93025">T1</text>
  <!-- call annotation -->
  <text x="240" y="148" text-anchor="middle" font-size="10" font-weight="bold" fill="#d93025">db_mark_invalid()</text>
  <line x1="240" y1="152" x2="240" y2="185" stroke="#d93025" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arr)"/>

  <!-- Gap bar (quality=1, red hatched) -->
  <rect x="240" y="155" width="280" height="40" rx="3" fill="#fce8e6" stroke="#d93025" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="380" y="172" text-anchor="middle" font-size="10" font-weight="bold" fill="#d93025">val_quality = 1  (no-data gap)</text>
  <text x="380" y="188" text-anchor="middle" font-size="10" fill="#d93025">all val_* columns = NULL</text>

  <!-- ── T2a: db_mark_valid() (explicit path) ── -->
  <line x1="440" y1="185" x2="440" y2="215" stroke="#555" stroke-width="1.2" stroke-dasharray="4,2"/>
  <text x="440" y="250" text-anchor="middle" font-size="9" fill="#888">T2a</text>

  <!-- ── T2b: new value arrives (implicit path) ── -->
  <line x1="520" y1="185" x2="520" y2="215" stroke="#555" stroke-width="1.2" stroke-dasharray="4,2"/>
  <text x="520" y="250" text-anchor="middle" font-size="9" fill="#888">T2b</text>

  <!-- "OR" annotation between T2a and T2b -->
  <text x="480" y="266" text-anchor="middle" font-size="12" font-weight="bold" fill="#888">— or —</text>

  <!-- ── Explicit close path (top lane) ── -->
  <!-- db_mark_valid() annotation at T2a -->
  <rect x="310" y="60" width="145" height="38" rx="4" fill="#fff" stroke="#888" stroke-width="1"/>
  <text x="382" y="77" text-anchor="middle" font-size="10" font-weight="bold" fill="#555">① db_mark_valid()</text>
  <text x="382" y="92" text-anchor="middle" font-size="10" fill="#888">closes gap explicitly</text>
  <line x1="382" y1="98" x2="440" y2="185" stroke="#888" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arr)"/>

  <!-- new value after explicit close -->
  <rect x="520" y="155" width="160" height="40" rx="3" fill="#34a853" opacity="0.8"/>
  <text x="600" y="180" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">val=67  q=0</text>

  <!-- ── Implicit close path (bottom lane) ── -->
  <rect x="455" y="290" width="175" height="46" rx="4" fill="#e8f0fe" stroke="#4a86e8" stroke-width="1.2"/>
  <text x="543" y="310" text-anchor="middle" font-size="10" font-weight="bold" fill="#2a5db0">② new value arrives</text>
  <text x="543" y="326" text-anchor="middle" font-size="10" fill="#555">update_item() → implicit</text>
  <text x="543" y="340" text-anchor="middle" font-size="9" fill="#555">gap close (no db_mark_valid needed)</text>
  <line x1="520" y1="290" x2="520" y2="215" stroke="#4a86e8" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arr)"/>

  <!-- ── Gap duration brace ── -->
  <line x1="240" y1="218" x2="520" y2="218" stroke="#d93025" stroke-width="1.2"/>
  <line x1="240" y1="214" x2="240" y2="222" stroke="#d93025" stroke-width="1.2"/>
  <line x1="520" y1="214" x2="520" y2="222" stroke="#d93025" stroke-width="1.2"/>
  <text x="380" y="236" text-anchor="middle" font-size="9" fill="#d93025">gap duration = T2 − T1  (calculated from gap-open time, not prev_change)</text>

  <!-- ── Legend ── -->
  <rect x="60" y="390" width="640" height="55" rx="5" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <rect x="80" y="405" width="18" height="14" rx="2" fill="#34a853" opacity="0.8"/>
  <text x="106" y="417" font-size="10" fill="#333">val_quality = 0  (valid, included in aggregations)</text>
  <rect x="80" y="425" width="18" height="14" rx="2" fill="#fce8e6" stroke="#d93025" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="106" y="437" font-size="10" fill="#333">val_quality = 1  (no-data gap, excluded from avg/sum/integrate/min/max; appears as NULL in raw queries)</text>
</svg>
