<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" font-family="Helvetica, Arial, sans-serif">
  <rect width="640" height="420" fill="#f9f9f9"/>

  <!-- Title -->
  <text x="320" y="30" text-anchor="middle" font-size="15" font-weight="bold" fill="#333">Current Architecture — Monolithic __init__.py</text>

  <!-- Outer class box -->
  <rect x="40" y="50" width="560" height="340" rx="6" fill="#fff" stroke="#555" stroke-width="2"/>
  <text x="320" y="72" text-anchor="middle" font-size="13" font-weight="bold" fill="#555">Database(SmartPlugin)</text>
  <text x="320" y="88" text-anchor="middle" font-size="10" fill="#888">plugins/database/__init__.py  (~1900 lines)</text>
  <line x1="40" y1="95" x2="600" y2="95" stroke="#ccc" stroke-width="1"/>

  <!-- Concern boxes — 2 columns × 4 rows -->
  <!-- Row 1 -->
  <rect x="60"  y="110" width="230" height="55" rx="4" fill="#e8f0fe" stroke="#4a86e8" stroke-width="1.2"/>
  <text x="175" y="130" text-anchor="middle" font-size="11" font-weight="bold" fill="#2a5db0">SQL DDL &amp; Schema</text>
  <text x="175" y="148" text-anchor="middle" font-size="10" fill="#555">_setup dict, _initialize_db()</text>

  <rect x="350" y="110" width="230" height="55" rx="4" fill="#e8f0fe" stroke="#4a86e8" stroke-width="1.2"/>
  <text x="465" y="130" text-anchor="middle" font-size="11" font-weight="bold" fill="#2a5db0">CRUD Helpers</text>
  <text x="465" y="148" text-anchor="middle" font-size="10" fill="#555">insertItem, readItem, insertLog, …</text>

  <!-- Row 2 -->
  <rect x="60"  y="180" width="230" height="55" rx="4" fill="#fce8e6" stroke="#d93025" stroke-width="1.2"/>
  <text x="175" y="200" text-anchor="middle" font-size="11" font-weight="bold" fill="#b31412">Buffer Management</text>
  <text x="175" y="218" text-anchor="middle" font-size="10" fill="#555">_buffer, _buffer_lock, _dump()</text>

  <rect x="350" y="180" width="230" height="55" rx="4" fill="#fce8e6" stroke="#d93025" stroke-width="1.2"/>
  <text x="465" y="200" text-anchor="middle" font-size="11" font-weight="bold" fill="#b31412">Analytics Queries</text>
  <text x="465" y="218" text-anchor="middle" font-size="10" fill="#555">_series(), _single(), _query()</text>

  <!-- Row 3 -->
  <rect x="60"  y="250" width="230" height="55" rx="4" fill="#e6f4ea" stroke="#34a853" stroke-width="1.2"/>
  <text x="175" y="270" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e7e34">Maintenance</text>
  <text x="175" y="288" text-anchor="middle" font-size="10" fill="#555">remove_older_than_maxage, orphans</text>

  <rect x="350" y="250" width="230" height="55" rx="4" fill="#e6f4ea" stroke="#34a853" stroke-width="1.2"/>
  <text x="465" y="270" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e7e34">Plugin Lifecycle</text>
  <text x="465" y="288" text-anchor="middle" font-size="10" fill="#555">__init__, run, stop, parse_item, update_item</text>

  <!-- Row 4 -->
  <rect x="60"  y="320" width="230" height="55" rx="4" fill="#fef7e0" stroke="#f9ab00" stroke-width="1.2"/>
  <text x="175" y="340" text-anchor="middle" font-size="11" font-weight="bold" fill="#9c6e00">CSV Export</text>
  <text x="175" y="358" text-anchor="middle" font-size="10" fill="#555">dump()</text>

  <rect x="350" y="320" width="230" height="55" rx="4" fill="#fef7e0" stroke="#f9ab00" stroke-width="1.2"/>
  <text x="465" y="340" text-anchor="middle" font-size="11" font-weight="bold" fill="#9c6e00">Web Interface</text>
  <text x="465" y="358" text-anchor="middle" font-size="10" fill="#555">webif/ glue, data endpoints</text>

  <!-- "tightly coupled" annotation -->
  <text x="320" y="408" text-anchor="middle" font-size="10" fill="#c00">All concerns share the same class — testing or changing one risks breaking another.</text>
</svg>
